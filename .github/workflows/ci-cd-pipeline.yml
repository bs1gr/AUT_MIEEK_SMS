name: CI/CD Pipeline - Student Management System

# Pipeline role clarification:
# - This workflow is the main CI pipeline plus optional deployment gates.
# - GitHub release publication is centralized in `release-on-tag.yml`.
# - Staging/production deployment jobs can be skipped intentionally when repo vars,
#   environments, or self-hosted runners are not enabled.
# - Slack notification should report CI outcomes even when release/deploy jobs are skipped by policy.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: false
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Optional Slack webhook for pipeline notifications'
        required: false

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # Use repository name for image

jobs:
  # ============================================================================
  # PHASE 1: PRE-COMMIT VALIDATION
  # ============================================================================

  version-verification:
    name: 🔍 Version Consistency Check
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          set-safe-directory: false
          persist-credentials: false

      - name: 🔒 Validate Version Format (v1.x.x ONLY)
        shell: pwsh
        run: |
          Write-Host "Validating version format (v1.x.x only)..." -ForegroundColor Cyan
          $versionFile = "VERSION"
          $version = (Get-Content $versionFile).Trim()
          Write-Host "Current version: $version" -ForegroundColor Blue

          # Check for forbidden patterns
          $forbiddenPatterns = @{
              'v11\.' = 'Version format v11.x.x breaks version tracking (CRITICAL)'
              '\$11\.' = 'Version format $11.x.x breaks version tracking (CRITICAL)'
              '^v2\.' = 'Version format v2.x.x uses wrong major version'
          }

          foreach ($pattern in $forbiddenPatterns.Keys) {
              if ($version -match $pattern) {
                  Write-Error "❌ CRITICAL VERSION VIOLATION: $($forbiddenPatterns[$pattern])" -ErrorAction Continue
                  Write-Error "Detected: $version (forbidden)" -ErrorAction Continue
                    Write-Error "Required format: v1.x.x (e.g., v1.17.1)" -ErrorAction Continue
                  exit 1
              }
          }

                # Validate strict v1.x.x format
                if ($version -match '^v1\.\d+\.\d+$') {
              Write-Host "✅ Version format valid: $version" -ForegroundColor Green
          } else {
              Write-Error "❌ Invalid version format: $version" -ErrorAction Continue
                  Write-Error "Required format: v1.x.x (e.g., v1.17.1)" -ErrorAction Continue
              exit 1
          }

      - name: Verify version consistency
        shell: pwsh
        run: |
          Write-Host "Verifying version consistency across codebase..." -ForegroundColor Cyan
          if (Test-Path "scripts\VERIFY_VERSION.ps1") {
            .\scripts\VERIFY_VERSION.ps1 -CheckOnly
            if ($LASTEXITCODE -eq 1) {
              Write-Error "❌ Critical version inconsistencies found"
              exit 1
            } elseif ($LASTEXITCODE -eq 2) {
              Write-Warning "⚠️  Version inconsistencies detected"
              Write-Host "Run: .\scripts\VERIFY_VERSION.ps1 -Update" -ForegroundColor Yellow
              exit 1
            }
          } else {
            Write-Warning "VERIFY_VERSION.ps1 not found. Running basic check via COMMIT_READY.ps1..."
            .\COMMIT_READY.ps1 -AuditVersion -SkipTests -SkipLint -SkipCleanup -Mode quick
          }
          Write-Host "✅ All version references consistent" -ForegroundColor Green

      - name: Generate version report
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "scripts\VERIFY_VERSION.ps1") {
            .\scripts\VERIFY_VERSION.ps1 -Report
          } else {
            Write-Warning "VERIFY_VERSION.ps1 not found. Skipping version report."
          }

      - name: Upload version report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: version-verification-report
          path: VERSION_VERIFICATION_REPORT.md
          retention-days: 30

  workflow-version-policy:
    name: 🛡️ Workflow Version Normalization Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enforce normalize-version in workflows
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $workflowFiles = Get-ChildItem -Path '.github/workflows/*.y*ml' -File
          $directReadPattern = '(?im)\b(Get-Content|cat)\s+(?:-Raw\s+)?["'']?(?:\./|\.\\)?VERSION["'']?\b'
          $normalizePattern = '(?im)uses:\s*\.\/\.github\/actions\/normalize-version\b'
          $violations = @()

          foreach ($file in $workflowFiles) {
            $content = Get-Content -Path $file.FullName -Raw
            $hasDirectVersionRead = [regex]::IsMatch($content, $directReadPattern)
            $usesNormalizeVersion = [regex]::IsMatch($content, $normalizePattern)

            if ($hasDirectVersionRead -and -not $usesNormalizeVersion) {
              $violations += $file.FullName
            }
          }

          if ($violations.Count -gt 0) {
            Write-Error '❌ Workflow version policy violation detected.'
            Write-Host 'Files with direct VERSION reads but no normalize-version usage:' -ForegroundColor Yellow
            $violations | ForEach-Object { Write-Host " - $_" }
            exit 1
          }

          Write-Host '✅ Workflow version policy check passed.' -ForegroundColor Green

  # ============================================================================
  # PHASE 2: LINTING, SECRET SCANNING & CODE QUALITY
  # ============================================================================

  lint-backend:
    name: 🔍 Backend Linting (Python)
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with dependency caching
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies (with cache)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi

      - name: Run Ruff linter
        run: |
          cd backend
          ruff check . --config=../config/ruff.toml --output-format=github

      - name: Run MyPy type checker
        run: |
          # Run mypy from project root to avoid namespace conflicts
          mypy --config-file=config/mypy.ini backend --namespace-packages

  lint-frontend:
    name: 🔍 Frontend Linting (TypeScript/React)
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd frontend && npm ci --silent

      - name: Install Playwright browsers (with cache)
        run: cd frontend && npx playwright install --with-deps

      - name: Prepare installer Greek text assets
        shell: pwsh
        run: |
          Write-Host "Ensuring installer Greek text assets are regenerated"
          if (Test-Path "fix_greek_encoding_permanent.py") {
            python "fix_greek_encoding_permanent.py"
          } else {
            Write-Host "Skipping fix_greek_encoding_permanent.py (file not found)"
          }

      - name: Run ESLint
        # ESLint warnings tracked in docs/plans/UNIFIED_WORK_PLAN.md (Issue 1)
        # 240 warnings identified (161 `any` types, 23 console.log, others)
        # Warnings allowed by ESLint config; errors must fail CI
        # Refactoring PR planned for next maintenance cycle
        run: |
          cd frontend
          npm run lint

      - name: Check TypeScript compilation
        run: cd frontend && npx tsc --noEmit

  secret-scan:
    name: "🕵️ Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks secret scan
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ============================================================================
  # PHASE 3: AUTOMATED TESTING
  # ============================================================================

  test-backend:
    name: 🧪 Backend Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with dependency caching
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies (with cache)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi

      - name: Run backend tests with coverage
        env:
          DISABLE_STARTUP_TASKS: '1'
          CSRF_ENABLED: '0'
          AUTH_MODE: 'strict'
          GITHUB_ACTIONS: 'true'
          CI: 'true'
          SMS_ALLOW_DIRECT_PYTEST: '1'
          SMS_TEST_RUNNER: 'batch'
        run: |
          cd backend
          pytest -v --cov=. --cov-report=html --cov-report=xml --cov-report=term-missing --html=pytest-report.html --self-contained-html --json-report --json-report-file=pytest-report.json

      - name: Publish backend failing tests summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          report_path = Path("backend/pytest-report.json")

          if not summary_path:
            raise SystemExit("GITHUB_STEP_SUMMARY not set")

          lines = []

          if not report_path.exists():
            lines.append("### Backend failing tests")
            lines.append("- pytest-report.json not found (test runner may have failed before report generation).")
            with open(summary_path, "a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
            raise SystemExit(0)

          try:
            data = json.loads(report_path.read_text(encoding="utf-8"))
          except Exception as exc:  # pragma: no cover - CI diagnostic path
            lines.append("### Backend failing tests")
            lines.append(f"- Could not parse pytest-report.json: {exc}")
            with open(summary_path, "a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
            raise SystemExit(0)

          tests = data.get("tests") or []
          failed = [t for t in tests if t.get("outcome") in {"failed", "error"}]
          xfailed = [t for t in tests if t.get("outcome") == "xfailed"]

          lines.append("### Backend failing tests")

          if not failed:
            lines.append("- None (no failing tests)")
          else:
            lines.append(f"- Total failing tests: **{len(failed)}**")
            for t in failed[:30]:
              nodeid = t.get("nodeid", "<unknown test>")
              outcome = t.get("outcome", "failed")
              lines.append(f"- `{nodeid}` ({outcome})")

              call = t.get("call") or {}
              longrepr = call.get("longrepr")
              if isinstance(longrepr, str) and longrepr.strip():
                snippet = " ".join(longrepr.strip().splitlines()[:2])
                lines.append(f"  - {snippet[:300]}")

            if len(failed) > 30:
              lines.append(f"- ... and {len(failed) - 30} more")

          if xfailed:
            lines.append(f"- xfailed (expected failures): {len(xfailed)}")

          summary = data.get("summary") or {}
          if summary:
            lines.append(
              "- Summary: "
              f"passed={summary.get('passed', 0)}, "
              f"failed={summary.get('failed', 0)}, "
              f"errors={summary.get('error', summary.get('errors', 0))}, "
              f"skipped={summary.get('skipped', 0)}, "
              f"total={summary.get('total', 0)}"
            )

          with open(summary_path, "a", encoding="utf-8") as fh:
            fh.write("\n".join(lines) + "\n")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/pytest-report.html
            backend/pytest-report.json
            backend/htmlcov/
          retention-days: 30

      - name: Publish backend coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          path = "backend/coverage.xml"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          if not summary_path:
            sys.exit("GITHUB_STEP_SUMMARY not set")

          if not os.path.exists(path):
            open(summary_path, "a", encoding="utf-8").write(
              "### Backend coverage\n- coverage.xml not found (tests may have failed).\n"
            )
            sys.exit(0)

          root = ET.parse(path).getroot()
          line_rate = float(root.attrib.get("line-rate", 0)) * 100
          branch_rate = float(root.attrib.get("branch-rate", 0)) * 100

          open(summary_path, "a", encoding="utf-8").write(
            f"### Backend coverage\n- Lines: {line_rate:.2f}%\n- Branches: {branch_rate:.2f}%\n"
          )
          PY

  test-frontend:
    name: 🧪 Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency caching
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies (with cache)
        run: cd frontend && npm ci --silent

      - name: Run frontend tests with coverage
        env:
          SMS_ALLOW_DIRECT_VITEST: '1'
          SMS_TEST_RUNNER: 'batch'
          CI: 'true'
          GITHUB_ACTIONS: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: cd frontend && npm run test -- --coverage --reporter=verbose --reporter=json --reporter=html --coverage.reporter=lcov --coverage.reporter=text-summary

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/coverage/
            frontend/test-results/
          retention-days: 30

      - name: Publish frontend coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import sys

          path = "frontend/coverage/lcov.info"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          if not summary_path:
            sys.exit("GITHUB_STEP_SUMMARY not set")

          if not os.path.exists(path):
            open(summary_path, "a", encoding="utf-8").write(
              "### Frontend coverage\n- lcov.info not found (tests may have failed).\n"
            )
            sys.exit(0)

          total_found = total_hit = branch_found = branch_hit = 0
          with open(path, "r", encoding="utf-8", errors="ignore") as f:
            for line in f:
              if line.startswith("LF:"):
                total_found += int(line.split(":", 1)[1])
              elif line.startswith("LH:"):
                total_hit += int(line.split(":", 1)[1])
              elif line.startswith("BRF:"):
                branch_found += int(line.split(":", 1)[1])
              elif line.startswith("BRH:"):
                branch_hit += int(line.split(":", 1)[1])

          line_rate = (total_hit / total_found * 100) if total_found else 0.0
          branch_rate = (branch_hit / branch_found * 100) if branch_found else 0.0

          open(summary_path, "a", encoding="utf-8").write(
            f"### Frontend coverage\n- Lines: {line_rate:.2f}% ({total_hit}/{total_found})\n- Branches: {branch_rate:.2f}% ({branch_hit}/{branch_found})\n"
          )
          PY

  smoke-tests:
    name: 💨 Smoke Tests (Server Startup Verification)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create data directory
        run: mkdir -p ./data

      - name: Initialize test database
        run: |
          cd backend
          python - <<'PY'
          from sqlalchemy import create_engine, text

          engine = create_engine('sqlite:///./data/test_smoke.db')
          with engine.connect() as conn:
              conn.execute(text('SELECT 1'))
              conn.commit()
          PY

      - name: Start backend server
        env:
          DISABLE_STARTUP_TASKS: '1'
          CSRF_ENABLED: '0'
          AUTH_MODE: 'permissive'
          DATABASE_URL: sqlite:///./data/test_smoke.db
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          echo $! > backend.pid
          sleep 3

      - name: Run health check endpoint
        run: |
          echo "🏥 Checking backend health..."
          curl -f -s http://127.0.0.1:8000/health | jq . || exit 1
          echo "✅ Backend health check passed"

      - name: Test core API endpoints
        run: |
          echo "🔍 Testing core API endpoints..."

          # Test students endpoint
          echo "Testing GET /api/v1/students..."
          curl -s http://127.0.0.1:8000/api/v1/students/ | jq . || echo "Students endpoint response"

          # Test courses endpoint
          echo "Testing GET /api/v1/courses..."
          curl -s http://127.0.0.1:8000/api/v1/courses/ | jq . || echo "Courses endpoint response"

          echo "✅ Core API endpoints responsive"

      - name: Cleanup
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  # ============================================================================
  # PHASE 4: BUILD & PACKAGE
  # ============================================================================

  build-frontend:
    name: 🏗️ Build Frontend (Production)
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --silent

      - name: Build production bundle
        env:
          VITE_API_URL: /api/v1
          NODE_ENV: production
        run: cd frontend && npm run ci:build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 30

      - name: Upload build stats
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-stats
          path: frontend/.vite/stats.json
          retention-days: 7
        if: always()

  build-docker-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend]
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Normalize version from VERSION file
        id: version
        uses: ./.github/actions/normalize-version

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version_tag }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image (with caching)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.fullstack
          # Push policy:
          # - Always push on release tags (v1.*.*)
          # - On branch pushes, push only if GHCR_TOKEN is configured
          #   (prevents write_package failures when repository GITHUB_TOKEN cannot push packages)
          push: ${{ github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v1.') || secrets.GHCR_TOKEN != '') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version_core }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ============================================================================
  # PHASE 5: SECURITY SCANNING
  # ============================================================================

  security-scan-backend:
    name: 🔒 Security Scan (Backend)
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with dependency caching
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies (with cache)
        run: |
          pip install safety bandit
          pip install -r backend/requirements.txt

      - name: Run Safety check
        run: |
          cd backend
          safety check --file requirements.txt --json

      - name: Run Bandit security scanner
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd backend
          bandit -r . -f csv -o bandit-report.csv 2>&1 || echo "Bandit completed with warnings"
          # Convert CSV to JSON if Bandit succeeded
          if [ -f bandit-report.csv ]; then
            echo "Bandit report generated successfully"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            backend/bandit-report.csv
            backend/bandit-report.json
          retention-days: 30

  security-scan-frontend:
    name: 🔒 Security Scan (Frontend)
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --silent

      - name: Run npm audit
        run: cd frontend && npm audit --omit=dev --json > npm-audit.json || true

      - name: Check npm audit results
        run: |
          cd frontend
          if npm audit --omit=dev --audit-level=moderate > /dev/null 2>&1; then
            echo "✓ No moderate or higher security vulnerabilities found"
          else
            echo "⚠ Security vulnerabilities detected"
            npm audit --omit=dev --audit-level=moderate
            exit 1
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-reports
          path: frontend/npm-audit.json
          retention-days: 30

  security-scan-docker:
    name: 🔒 Security Scan (Docker Images)
    runs-on: ubuntu-latest
    needs: [build-docker-images]
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
      contents: read
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy on local filesystem for Dockerfiles
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: './docker'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
        continue-on-error: true

  # ============================================================================
  # PHASE 6: DOCUMENTATION & CLEANUP
  # ============================================================================

  cleanup-and-docs:
    name: 📚 Documentation & Cleanup Validation
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify documentation consistency
        run: |
          echo "🔍 Checking documentation TODOs..."
          TODO_COUNT=$(grep -r "TODO\|FIXME\|XXX" docs/ \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=archive \
            --exclude-dir=docs/archive \
            --exclude-dir=docs/reports \
            --exclude-dir=docs/releases/reports \
            --exclude-dir=docs/development/sessions \
            | wc -l || true)
          echo "Found $TODO_COUNT TODO items in documentation"

          if [ $TODO_COUNT -gt 50 ]; then
            echo "::warning::High number of TODO items in documentation ($TODO_COUNT)"
          fi

      - name: Check for obsolete files
        run: |
          echo "🧹 Checking for deprecated/obsolete files..."
          find . -type f -name "*.deprecated" -o -name "*.obsolete" -o -name "*.bak" | tee obsolete-files.txt

          OBSOLETE_COUNT=$(wc -l < obsolete-files.txt)
          if [ $OBSOLETE_COUNT -gt 0 ]; then
            echo "::warning::Found $OBSOLETE_COUNT obsolete files"
            cat obsolete-files.txt
          fi

      - name: Validate markdown links
        shell: bash
        run: |
          echo "ℹ️ Markdown link validation skipped (external action not allowed)"
          echo "To validate locally: npm install -g markdown-link-check && markdown-link-check README.md"

      - name: Generate documentation index
        run: |
          echo "# Documentation Index" > DOCS_INDEX.md
          echo "" >> DOCS_INDEX.md
          echo "Generated: $(date)" >> DOCS_INDEX.md
          echo "" >> DOCS_INDEX.md
          find docs/ -name "*.md" -type f | sort >> DOCS_INDEX.md

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation-index
          path: DOCS_INDEX.md
          retention-days: 7

  release-asset-lock:
    name: 🔐 Release Asset Mutation Lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enforce release asset mutation policy
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking release asset mutation commands across workflows (repo-level gate)..."

          mapfile -t GH_UPLOAD_HITS < <(
            grep -RIn --include='*.yml' --include='*.yaml' \
              -E '^[[:space:]]*gh[[:space:]]+release[[:space:]]+upload\b|release",[[:space:]]*"upload"' .github/workflows || true
          )

          mapfile -t API_UPLOAD_HITS < <(
            grep -RIn --include='*.yml' --include='*.yaml' \
              -E 'uploadReleaseAsset[[:space:]]*\(|repos\.uploadReleaseAsset\b' .github/workflows || true
          )

          UPLOAD_HITS=("${GH_UPLOAD_HITS[@]}" "${API_UPLOAD_HITS[@]}")

          if [ ${#UPLOAD_HITS[@]} -eq 0 ]; then
            echo "❌ No release asset upload commands found at all."
            echo "Expected installer workflow to manage installer asset upload path."
            exit 1
          fi

          echo "Found potential release asset upload commands:"
          printf '  %s\n' "${UPLOAD_HITS[@]}"

          for hit in "${UPLOAD_HITS[@]}"; do
            if [[ "$hit" != *".github/workflows/release-installer-with-sha.yml"* ]]; then
              echo "❌ Policy violation: non-installer workflow uploads release assets"
              echo "Offending entry: $hit"
              exit 1
            fi
          done

          mapfile -t DELETE_HITS < <(
            grep -RIn --include='*.yml' --include='*.yaml' \
              -E '^[[:space:]]*gh[[:space:]]+release[[:space:]]+delete-asset\b|release",[[:space:]]*"delete-asset"' .github/workflows || true
          )

          if [ ${#DELETE_HITS[@]} -gt 0 ]; then
            echo "Found potential release asset delete commands:"
            printf '  %s\n' "${DELETE_HITS[@]}"

            for hit in "${DELETE_HITS[@]}"; do
              if [[ "$hit" != *".github/workflows/release-installer-with-sha.yml"* && "$hit" != *".github/workflows/release-asset-sanitizer.yml"* ]]; then
                echo "❌ Policy violation: unauthorized workflow deletes release assets"
                echo "Offending entry: $hit"
                exit 1
              fi
            done
          fi

          echo "✅ Release asset mutation policy passed (upload: installer only, delete: installer/sanitizer only)"

  # Gate job pattern (reuse for future deploy/release gates):
  # 1. Keep policy evaluation in a small ubuntu-latest job.
  # 2. Read event/inputs/vars/secrets into env once.
  # 3. Emit normalized outputs such as should_deploy and resolved URLs.
  # 4. Let self-hosted execution jobs depend on gate outputs only.
  # This keeps execution jobs readable and isolates optional-config warning noise.

  staging-deploy-gate:
    name: 🚦 Evaluate Staging Deployment Gate
    runs-on: ubuntu-latest
    needs: [build-docker-images, security-scan-docker, cleanup-and-docs]
    # Pattern: evaluate policy once, then export normalized values for the real deploy job.
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
      staging_url: ${{ steps.gate.outputs.staging_url }}
    env:
      EVENT_NAME: ${{ github.event_name }}
      REF_NAME: ${{ github.ref }}
      ACTOR: ${{ github.actor }}
      INPUT_DEPLOY_ENV: ${{ inputs.deploy_environment || '' }}
      AUTO_DEPLOY_ON_PUSH: ${{ vars['AUTO_DEPLOY_ON_PUSH'] }}
      STAGING_DEPLOY_ENABLED: ${{ vars['STAGING_DEPLOY_ENABLED'] }}
      STAGING_URL_RAW: ${{ vars['STAGING_URL'] }}
      DEPLOY_HOST_RAW: ${{ secrets['DEPLOY_HOST'] || vars['DEPLOY_HOST'] }}
    steps:
      - name: Resolve staging gate
        id: gate
        shell: pwsh
        run: |
          $shouldDeploy = $false
          $stagingUrl = $env:STAGING_URL_RAW
          $deployHost = $env:DEPLOY_HOST_RAW

          if ([string]::IsNullOrWhiteSpace($stagingUrl) -and -not [string]::IsNullOrWhiteSpace($deployHost)) {
            $stagingUrl = "https://$deployHost"
          }

          if ($env:EVENT_NAME -eq 'workflow_dispatch' -and $env:INPUT_DEPLOY_ENV -eq 'staging') {
            $shouldDeploy = $true
          }
          elseif ($env:EVENT_NAME -eq 'workflow_call' -and $env:INPUT_DEPLOY_ENV -eq 'staging') {
            $shouldDeploy = $true
          }
          elseif (
            $env:EVENT_NAME -eq 'push' -and
            $env:REF_NAME -eq 'refs/heads/main' -and
            $env:ACTOR -eq 'bs1gr' -and
            $env:STAGING_DEPLOY_ENABLED -eq 'true' -and
            $env:AUTO_DEPLOY_ON_PUSH -eq 'true' -and
            -not [string]::IsNullOrWhiteSpace($stagingUrl)
          ) {
            $shouldDeploy = $true
          }

          "should_deploy=$($shouldDeploy.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "staging_url=$stagingUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  production-deploy-gate:
    name: 🚦 Evaluate Production Deployment Gate
    runs-on: ubuntu-latest
    needs: [build-docker-images, security-scan-docker, cleanup-and-docs]
    # Pattern: evaluate policy once, then export normalized values for the real deploy job.
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
      prod_url: ${{ steps.gate.outputs.prod_url }}
      deploy_host: ${{ steps.gate.outputs.deploy_host }}
    env:
      EVENT_NAME: ${{ github.event_name }}
      REF_NAME: ${{ github.ref }}
      INPUT_DEPLOY_ENV: ${{ inputs.deploy_environment || '' }}
      AUTO_DEPLOY_ON_PUSH: ${{ vars['AUTO_DEPLOY_ON_PUSH'] }}
      PROD_DEPLOY_ENABLED: ${{ vars['PROD_DEPLOY_ENABLED'] }}
      PROD_URL_RAW: ${{ vars['PROD_URL'] }}
      DEPLOY_HOST_RAW: ${{ secrets['DEPLOY_HOST'] || vars['DEPLOY_HOST'] }}
    steps:
      - name: Resolve production gate
        id: gate
        shell: pwsh
        run: |
          $shouldDeploy = $false
          $prodUrl = $env:PROD_URL_RAW
          $deployHost = $env:DEPLOY_HOST_RAW

          if ([string]::IsNullOrWhiteSpace($prodUrl) -and -not [string]::IsNullOrWhiteSpace($deployHost)) {
            $prodUrl = "https://$deployHost"
          }

          if ($env:EVENT_NAME -eq 'workflow_dispatch' -and $env:INPUT_DEPLOY_ENV -eq 'production' -and $env:PROD_DEPLOY_ENABLED -eq 'true') {
            $shouldDeploy = $true
          }
          elseif ($env:EVENT_NAME -eq 'workflow_call' -and $env:INPUT_DEPLOY_ENV -eq 'production' -and $env:PROD_DEPLOY_ENABLED -eq 'true') {
            $shouldDeploy = $true
          }
          elseif (
            $env:EVENT_NAME -eq 'push' -and
            $env:REF_NAME -eq 'refs/heads/main' -and
            $env:PROD_DEPLOY_ENABLED -eq 'true' -and
            $env:AUTO_DEPLOY_ON_PUSH -eq 'true'
          ) {
            $shouldDeploy = $true
          }

          "should_deploy=$($shouldDeploy.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "prod_url=$prodUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "deploy_host=$deployHost" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  # ============================================================================
  # PHASE 7: DEPLOYMENT TO STAGING
  # ============================================================================

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: [self-hosted, windows, staging-lan]
    needs: [staging-deploy-gate]
    # Execution job pattern: consume gate outputs only; avoid embedding policy logic here.
    if: needs.staging-deploy-gate.outputs.should_deploy == 'true'
    environment:
      name: staging
      url: ${{ needs.staging-deploy-gate.outputs.staging_url }}
    env:
      STAGING_URL: ${{ needs.staging-deploy-gate.outputs.staging_url }}
    steps:
      - name: Normalize Git settings (self-hosted runner)
        shell: pwsh
        run: |
          git config --global core.useBuiltinFSMonitor false
          git config --global core.fsmonitor false
          git config --global advice.useCoreFSMonitorConfig false
          git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize version from VERSION file
        id: version
        uses: ./.github/actions/normalize-version

      - name: Stop existing staging stack (safe)
        shell: pwsh
        run: |
          if (Test-Path ".\DOCKER.ps1") {
            .\DOCKER.ps1 -Stop
          }

      - name: Free port 8080 if occupied
        shell: pwsh
        run: |
          Write-Host "🔍 Checking for containers on port 8080..." -ForegroundColor Cyan
          try {
            # Check if docker is available
            $dockerTest = docker version 2>&1 | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "⚠️  Docker is not available or not running. Skipping port cleanup." -ForegroundColor Yellow
              exit 0
            }

            # Get containers on port 8080
            $portContainers = docker ps --filter "publish=8080" --format "{{.ID}}" 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "⚠️  Could not query Docker containers. Skipping port cleanup." -ForegroundColor Yellow
              exit 0
            }

            if ($portContainers -and $portContainers.Count -gt 0) {
              Write-Warning "Port 8080 is in use. Stopping $($portContainers.Count) container(s)..."
              foreach ($id in $portContainers) {
                Write-Host "  Stopping container: $id"
                docker stop $id 2>&1 | Out-Null
                docker rm $id 2>&1 | Out-Null
              }
              Write-Host "✅ Port cleanup completed" -ForegroundColor Green
            } else {
              Write-Host "✅ Port 8080 is free" -ForegroundColor Green
            }
          } catch {
            Write-Host "⚠️  Error during port cleanup (non-fatal): $_" -ForegroundColor Yellow
            exit 0
          }

      - name: Ensure Docker is running (runner health check)
        shell: pwsh
        run: |
          Write-Host "Ensuring Docker is running..." -ForegroundColor Cyan

          $dockerBinCandidates = @(
            "C:\Program Files\Docker\Docker\resources\bin",
            "C:\Program Files\Docker\Docker\resources"
          )

          foreach ($path in $dockerBinCandidates) {
            if ((Test-Path -LiteralPath $path) -and ($env:Path -notlike "*$path*")) {
              $env:Path = "$path;$env:Path"
              Add-Content -Path $env:GITHUB_PATH -Value $path
            }
          }

          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Error "Docker command not found in PATH after normalization"
            exit 1
          }

          try {
            Start-Service -Name "com.docker.service" -ErrorAction SilentlyContinue | Out-Null
          } catch {
            # Service may not exist in all environments
          }

          $desktopCandidates = @(
            "C:\Program Files\Docker\Docker\Docker Desktop.exe",
            "C:\Program Files\Docker\Docker\Docker.exe"
          )

          foreach ($candidate in $desktopCandidates) {
            if (Test-Path $candidate) {
              Start-Process -FilePath $candidate -ErrorAction SilentlyContinue | Out-Null
              break
            }
          }

          # Check if Docker daemon/process is running
          # For service accounts, we check process existence rather than docker ps execution
          $maxAttempts = 12
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            # Try docker ps first (works if runner has Docker access)
            docker ps > $null 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker is available and running (verified via docker ps)" -ForegroundColor Green
              exit 0
            }

            # Fallback: check if Docker process is actually running
            $dockerProcess = Get-Process docker, dockerd, "Docker Desktop" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dockerProcess) {
              Write-Host "Docker process detected ($($dockerProcess.ProcessName)) - proceeding with deployment" -ForegroundColor Green
              exit 0
            }

            Write-Host "  Waiting for Docker to start ($attempt/$maxAttempts)..." -ForegroundColor Gray
            Start-Sleep -Seconds 3
          }

          Write-Error "Docker failed to start after $maxAttempts attempts"
          exit 1

      - name: Docker status snapshot
        shell: pwsh
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Warning "Docker command not found; skipping status snapshot"
            exit 0
          }

          Write-Host "Docker version:" -ForegroundColor Cyan
          docker version

          Write-Host "Docker info:" -ForegroundColor Cyan
          docker info

          Write-Host "Docker containers:" -ForegroundColor Cyan
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Deploy to staging server
        shell: pwsh
        run: |
          Write-Host "🚀 Deploying version ${{ steps.version.outputs.version }} to staging..."
          if (-not (Test-Path ".\DOCKER.ps1")) {
            Write-Error "DOCKER.ps1 not found in repository root. Cannot deploy staging."
            exit 1
          }

          .\DOCKER.ps1 -Update
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Staging deployment failed (DOCKER.ps1 -Update)"
            exit $LASTEXITCODE
          }

          Write-Host "✅ Staging deployment updated"

      - name: Run post-deployment health check
        shell: pwsh
        run: |
          Write-Host "🏥 Running health checks on staging..."
          $stagingUrl = $env:STAGING_URL
          $maxAttempts = 30

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Health check attempt $attempt/$maxAttempts..."
            try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri "$stagingUrl/health" -TimeoutSec 10
              if ($response.StatusCode -eq 200 -and $response.Content -match '"status"') {
                Write-Host "✅ Staging health check passed"
                $response.Content | Write-Host
                exit 0
              }
            } catch {
              Write-Host "Health check attempt failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 10
          }

          Write-Error "❌ Staging health check failed after $maxAttempts attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Commit: ${{ github.sha }}"

  # ============================================================================
  # PHASE 8: DEPLOYMENT TO PRODUCTION
  # ============================================================================

  deploy-production:
    name: 🎯 Deploy to Production
    runs-on: [self-hosted, windows, production-lan]
    needs: [production-deploy-gate]
    # Execution job pattern: consume gate outputs only; avoid embedding policy logic here.
    if: needs.production-deploy-gate.outputs.should_deploy == 'true'
    environment:
      name: production
      url: ${{ needs.production-deploy-gate.outputs.prod_url }}
    env:
      PROD_URL: ${{ needs.production-deploy-gate.outputs.prod_url }}
      DEPLOY_HOST: ${{ needs.production-deploy-gate.outputs.deploy_host }}
    steps:
      - name: Check production deployment prerequisites
        shell: pwsh
        run: |
          Write-Host "🔍 Checking production deployment prerequisites..." -ForegroundColor Cyan
          $prodUrlSet = -not [string]::IsNullOrWhiteSpace($env:PROD_URL)
          $deployHostSet = -not [string]::IsNullOrWhiteSpace($env:DEPLOY_HOST)

          if (-not ($prodUrlSet -or $deployHostSet)) {
            Write-Host "⚠️  PROD_URL and DEPLOY_HOST are both empty. Skipping production deployment." -ForegroundColor Yellow
            Write-Host ''
            Write-Host 'To enable production deployment, configure in GitHub:' -ForegroundColor Cyan
            Write-Host '1. Repo → Settings → Environments → production' -ForegroundColor Yellow
            Write-Host '   Add Variables:' -ForegroundColor Yellow
            Write-Host '   - PROD_URL (e.g., https://sms.example.com)' -ForegroundColor Yellow
            Write-Host '   - or DEPLOY_HOST (e.g., sms.example.com)' -ForegroundColor Yellow
            Write-Host '2. Add Secrets (optional):' -ForegroundColor Yellow
            Write-Host '   - DEPLOY_HOST (if not in vars)' -ForegroundColor Yellow
            Write-Host '   - DEPLOY_USER (default: deploy)' -ForegroundColor Yellow
            Write-Host '3. Register self-hosted runner with labels: self-hosted, windows, production-lan' -ForegroundColor Yellow
            exit 0
          }

          Write-Host "✅ Prerequisites met. Proceeding with production deployment." -ForegroundColor Green
          Write-Host "PROD_URL: $env:PROD_URL" -ForegroundColor Cyan
          if ($deployHostSet) {
            Write-Host "DEPLOY_HOST: $env:DEPLOY_HOST" -ForegroundColor Cyan
          }

      - name: Normalize Git settings (self-hosted runner)
        shell: pwsh
        run: |
          git config --global core.useBuiltinFSMonitor false
          git config --global core.fsmonitor false
          git config --global advice.useCoreFSMonitorConfig false
          git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version source
        id: version_source
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v1.*') {
            $versionRaw = $env:GITHUB_REF -replace '^refs/tags/', ''
          } else {
            $versionRaw = ''
          }
          "version=$versionRaw" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Normalize resolved version
        id: version
        uses: ./.github/actions/normalize-version
        with:
          version: ${{ steps.version_source.outputs.version }}

      - name: Stop existing production stack (safe)
        shell: pwsh
        run: |
          if (Test-Path ".\DOCKER.ps1") {
            .\DOCKER.ps1 -Stop
          }

      - name: Ensure Docker is running (runner health check)
        shell: pwsh
        run: |
          Write-Host "Ensuring Docker is running..." -ForegroundColor Cyan

          $dockerBinCandidates = @(
            "C:\Program Files\Docker\Docker\resources\bin",
            "C:\Program Files\Docker\Docker\resources"
          )

          foreach ($path in $dockerBinCandidates) {
            if ((Test-Path -LiteralPath $path) -and ($env:Path -notlike "*$path*")) {
              $env:Path = "$path;$env:Path"
              Add-Content -Path $env:GITHUB_PATH -Value $path
            }
          }

          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Error "Docker command not found in PATH after normalization"
            exit 1
          }

          try {
            Start-Service -Name "com.docker.service" -ErrorAction SilentlyContinue | Out-Null
          } catch {
            # Service may not exist in all environments
          }

          $desktopCandidates = @(
            "C:\Program Files\Docker\Docker\Docker Desktop.exe",
            "C:\Program Files\Docker\Docker\Docker.exe"
          )

          foreach ($candidate in $desktopCandidates) {
            if (Test-Path $candidate) {
              Start-Process -FilePath $candidate -ErrorAction SilentlyContinue | Out-Null
              break
            }
          }

          $maxAttempts = 12
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            docker ps > $null 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker is available and running (verified via docker ps)" -ForegroundColor Green
              exit 0
            }

            $dockerProcess = Get-Process docker, dockerd, "Docker Desktop" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dockerProcess) {
              Write-Host "Docker process detected ($($dockerProcess.ProcessName)) - proceeding with deployment" -ForegroundColor Green
              exit 0
            }

            Write-Host "  Waiting for Docker to start ($attempt/$maxAttempts)..." -ForegroundColor Gray
            Start-Sleep -Seconds 3
          }

          Write-Error "Docker failed to start after $maxAttempts attempts"
          exit 1

      - name: Docker status snapshot
        shell: pwsh
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Warning "Docker command not found; skipping status snapshot"
            exit 0
          }

          Write-Host "Docker version:" -ForegroundColor Cyan
          docker version

          Write-Host "Docker info:" -ForegroundColor Cyan
          docker info

          Write-Host "Docker containers:" -ForegroundColor Cyan
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Deploy to production server
        shell: pwsh
        run: |
          Write-Host "🚀 Deploying version ${{ steps.version.outputs.version }} to production..."
          if (-not (Test-Path ".\DOCKER.ps1")) {
            Write-Error "DOCKER.ps1 not found in repository root. Cannot deploy production."
            exit 1
          }

          .\DOCKER.ps1 -Update
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Production deployment failed (DOCKER.ps1 -Update)"
            exit $LASTEXITCODE
          }

          Write-Host "✅ Production deployment updated"

      - name: Run post-deployment validation
        shell: pwsh
        run: |
          Write-Host "🏥 Running production health checks..."
          $prodUrl = $env:PROD_URL
          $maxAttempts = 30

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Health check attempt $attempt/$maxAttempts..."
            try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri "$prodUrl/health" -TimeoutSec 10
              if ($response.StatusCode -eq 200 -and $response.Content -match '"status"') {
                Write-Host "✅ Production health check passed"
                $response.Content | Write-Host
                exit 0
              }
            } catch {
              Write-Host "Health check attempt failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 10
          }

          Write-Error "❌ Production health check failed after $maxAttempts attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Tag: ${{ github.ref }}"

  # ============================================================================
  # PHASE 9: RELEASE MANAGEMENT
  # ============================================================================

  create-release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    # Release creation is centralized in release-on-tag.yml.
    # Keep this job disabled to prevent duplicate release owners.
    if: ${{ false }}
    needs: [build-docker-images, release-asset-lock] # release-asset-lock enforces installer-only asset mutation
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Validate release artifact hygiene
        shell: bash
        run: |
          set -euo pipefail

          echo "Validating downloaded artifact hygiene..."
          mapfile -t BAD_FILES < <(find ./artifacts -type f \
            \( -name '*.html' -o -name '*.js' -o -name '*.css' -o -name '*.ico' \) || true)

          if [ ${#BAD_FILES[@]} -gt 0 ]; then
            echo "❌ Found web/static build files in generic release artifact set:"
            printf '  - %s\n' "${BAD_FILES[@]}"
            echo "These files must never be uploaded as GitHub release assets from CI pipeline."
            exit 1
          fi

          if [ -f frontend/public/favicon.ico ]; then
            ICON_BYTES=$(wc -c < frontend/public/favicon.ico)
            ICON_TEXT=$(tr -d '\r\n' < frontend/public/favicon.ico | head -c 64 || true)
            if [ "$ICON_BYTES" -lt 64 ] || [ "$ICON_TEXT" = "placeholder" ]; then
              echo "❌ Invalid placeholder favicon detected (frontend/public/favicon.ico)"
              echo "Size: ${ICON_BYTES} bytes; value: '${ICON_TEXT}'"
              echo "Provide a real favicon.ico before creating a release."
              exit 1
            fi
          fi

          echo "✅ Release artifact hygiene checks passed"

      - name: Validate release tag lineage
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          echo "Resolved tag: $TAG"

          if [[ ! "$TAG" =~ ^v1\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid release tag format: '$TAG'"
            echo "Required format: v1.MAJOR.MINOR (e.g., v1.18.1)"
            exit 1
          fi

          if [[ "$TAG" != "${GITHUB_REF_NAME}" ]]; then
            echo "❌ Ref mismatch: GITHUB_REF_NAME='${GITHUB_REF_NAME}' but resolved TAG='$TAG'"
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "❌ Tag '$TAG' does not exist in repository refs"
            exit 1
          fi

          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          FILE_VERSION_NORM="${FILE_VERSION#v}"
          TAG_VERSION_NORM="${TAG#v}"
          echo "VERSION file: $FILE_VERSION"

          if [[ "$FILE_VERSION_NORM" != "$TAG_VERSION_NORM" ]]; then
            echo "❌ VERSION/tag mismatch: VERSION='$FILE_VERSION' vs TAG='$TAG'"
            exit 1
          fi

          echo "✅ Release tag lineage validation passed"

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          echo "Generating release notes for v${{ steps.version.outputs.version }}..."
          if [ -f "release_notes_v${{ steps.version.outputs.version }}.md" ]; then
            cat "release_notes_v${{ steps.version.outputs.version }}.md" > RELEASE_NOTES.md
          else
            echo "# Release v${{ steps.version.outputs.version }}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "## Changes" >> RELEASE_NOTES.md
            # Safely get previous tag, fallback to all history if none
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" >> RELEASE_NOTES.md
            else
              git log --pretty=format:"- %s" ${PREV_TAG}..HEAD >> RELEASE_NOTES.md
            fi
          fi

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          NOTES_FILE="RELEASE_NOTES.md"

          # IMPORTANT:
          # - Do NOT upload generic CI artifacts to GitHub releases from this pipeline.
          # - Installer assets are managed by dedicated installer workflows with digest validation.
          # - This avoids release pollution (frontend dist chunks, html reports, misc build outputs).

          # Attempt to create release. If it already exists, update notes only.
          if ! gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file "$NOTES_FILE" \
            --generate-notes; then
            echo "Release creation failed (likely already exists). Updating existing release..."
            gh release edit "$VERSION" --notes-file "$NOTES_FILE"
          else
            echo "Release created successfully (notes only)."
          fi

  # ============================================================================
  # PHASE 10: POST-DEPLOYMENT MONITORING
  # ============================================================================

  post-deployment-monitoring:
    name: 📊 Post-Deployment Monitoring
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [production-deploy-gate, deploy-production]
    # Monitoring reuses the normalized production URL from the gate job.
    if: startsWith(github.ref, 'refs/tags/v1.') && needs.deploy-production.result == 'success'
    env:
      PROD_URL: ${{ needs.production-deploy-gate.outputs.prod_url }}
    steps:
      - name: Monitor application health
        run: |
          echo "📊 Monitoring application health for 5 minutes..."
          HEALTH_CHECKS=0
          HEALTH_FAILURES=0

          check_health() {
            local url="$1"
            curl -f -s "${url}" | grep -q '"status"'
          }

          if [ -z "${PROD_URL}" ]; then
            echo "⚠️  PROD_URL not set. Skipping post-deployment monitoring."
            exit 0
          fi

          for i in {1..10}; do
            echo "Health check $i/10 at $(date)..."
            HEALTH_CHECKS=$((HEALTH_CHECKS + 1))

            if check_health "${PROD_URL}/health" || check_health "${PROD_URL}/api/v1/health"; then
              echo "✅ Health check passed"
            else
              echo "⚠️  Health check failed"
              HEALTH_FAILURES=$((HEALTH_FAILURES + 1))
            fi

            sleep 30
          done

          echo "📊 Health monitoring summary:"
          echo "Total checks: $HEALTH_CHECKS"
          echo "Failures: $HEALTH_FAILURES"
          echo "Success rate: $(( (HEALTH_CHECKS - HEALTH_FAILURES) * 100 / HEALTH_CHECKS ))%"

          if [ $HEALTH_FAILURES -gt 2 ]; then
            echo "❌ Too many health check failures"
            exit 1
          fi

      - name: Check application metrics
        run: |
          echo "📈 Checking application metrics..."
          if [ -z "${PROD_URL}" ]; then
            echo "⚠️  PROD_URL not set. Skipping metrics check."
            exit 0
          fi
          # Check metrics endpoint if available
          if curl -f -s "${PROD_URL}/metrics" > /dev/null 2>&1; then
            echo "✅ Metrics endpoint responsive"
            # Parse and validate key metrics
            echo "Metric checks completed"
          else
            echo "⚠️  Metrics endpoint not available (optional)"
          fi

      - name: Notify monitoring results
        if: always()
        run: |
          echo "✅ Post-deployment monitoring complete"

  # ============================================================================
  # NOTIFICATION JOB (Always runs)
  # ============================================================================

  notify-completion:
    name: 📣 Notify Pipeline Completion
    runs-on: ubuntu-latest
    needs:
      [
        version-verification,
        workflow-version-policy,
        lint-backend,
        lint-frontend,
        secret-scan,
        test-backend,
        test-frontend,
        smoke-tests,
        build-frontend,
        build-docker-images,
        security-scan-backend,
        security-scan-frontend,
        security-scan-docker,
        cleanup-and-docs,
        release-asset-lock,
        staging-deploy-gate,
        production-deploy-gate,
        create-release,
        deploy-staging,
        deploy-production,
        post-deployment-monitoring
      ]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          RESULTS="${{ needs.version-verification.result }} ${{ needs.workflow-version-policy.result }} ${{ needs.lint-backend.result }} ${{ needs.lint-frontend.result }} ${{ needs.secret-scan.result }} ${{ needs.test-backend.result }} ${{ needs.test-frontend.result }} ${{ needs.smoke-tests.result }} ${{ needs.build-frontend.result }} ${{ needs.build-docker-images.result }} ${{ needs.security-scan-backend.result }} ${{ needs.security-scan-frontend.result }} ${{ needs.security-scan-docker.result }} ${{ needs.cleanup-and-docs.result }} ${{ needs.release-asset-lock.result }} ${{ needs.staging-deploy-gate.result }} ${{ needs.production-deploy-gate.result }} ${{ needs.create-release.result }} ${{ needs.deploy-staging.result }} ${{ needs.deploy-production.result }} ${{ needs.post-deployment-monitoring.result }}"
          if echo "$RESULTS" | grep -Eq "failure|cancelled"; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=CI/CD pipeline reported one or more failed jobs" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=CI pipeline completed successfully (release/deploy gates may be intentionally skipped)" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "SMS CI/CD Pipeline: ${{ steps.status.outputs.status }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.event_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Pipeline Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
