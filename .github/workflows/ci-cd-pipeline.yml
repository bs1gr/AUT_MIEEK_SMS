name: CI/CD Pipeline - Student Management System

# Pipeline role clarification:
# - This workflow is the main CI pipeline plus optional deployment gates.
# - GitHub release publication is centralized in `release-on-tag.yml`.
# - Staging/production deployment jobs can be skipped intentionally when repo vars,
#   environments, or self-hosted runners are not enabled.
# - Slack notification should report CI outcomes even when release/deploy jobs are skipped by policy.

on:
  push:
    branches:
      - main
      - phase-4-staging
  pull_request:
    branches:
      - main
      - phase-4-staging
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: false
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Optional Slack webhook for pipeline notifications'
        required: false

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'  # LTS version with broad compatibility
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # Use repository name for image

jobs:
  # ============================================================================
  # PHASE 1: PRE-COMMIT VALIDATION
  # ============================================================================

  version-verification:
    name: 🔍 Version Consistency Check
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          set-safe-directory: false
          persist-credentials: false

      - name: 🔒 Validate Version Format (v1.x.x ONLY)
        shell: pwsh
        run: |
          Write-Host "Validating version format (v1.x.x only)..." -ForegroundColor Cyan
          $versionFile = "VERSION"
          $version = (Get-Content $versionFile).Trim()
          Write-Host "Current version: $version" -ForegroundColor Blue

          # Check for forbidden patterns
          $forbiddenPatterns = @{
              'v11\.' = 'Version format v11.x.x breaks version tracking (CRITICAL)'
              '\$11\.' = 'Version format $11.x.x breaks version tracking (CRITICAL)'
              '^v2\.' = 'Version format v2.x.x uses wrong major version'
          }

          foreach ($pattern in $forbiddenPatterns.Keys) {
              if ($version -match $pattern) {
                  Write-Error "❌ CRITICAL VERSION VIOLATION: $($forbiddenPatterns[$pattern])" -ErrorAction Continue
                  Write-Error "Detected: $version (forbidden)" -ErrorAction Continue
                    Write-Error "Required format: v1.x.x (e.g., v1.17.1)" -ErrorAction Continue
                  exit 1
              }
          }

                # Validate strict v1.x.x format
                if ($version -match '^v1\.\d+\.\d+$') {
              Write-Host "✅ Version format valid: $version" -ForegroundColor Green
          } else {
              Write-Error "❌ Invalid version format: $version" -ErrorAction Continue
                  Write-Error "Required format: v1.x.x (e.g., v1.17.1)" -ErrorAction Continue
              exit 1
          }

      - name: Verify version consistency
        shell: pwsh
        run: |
          Write-Host "Verifying version consistency across codebase..." -ForegroundColor Cyan

          $scriptPath = "scripts\VERIFY_VERSION.ps1"
          if (-not (Test-Path $scriptPath)) {
            Write-Error "❌ VERIFY_VERSION.ps1 not found at $scriptPath. This script is mandatory for version verification."
            Write-Error "Ensure all required scripts are present in the repository."
            exit 1
          }

          .\scripts\VERIFY_VERSION.ps1 -CIMode
          if ($LASTEXITCODE -eq 1) {
            Write-Error "❌ Critical version inconsistencies found"
            exit 1
          }

          Write-Host "✅ All version references consistent" -ForegroundColor Green

      - name: Generate version report
        if: always()
        shell: pwsh
        run: |
          $scriptPath = "scripts\VERIFY_VERSION.ps1"
          if (-not (Test-Path $scriptPath)) {
            Write-Error "VERIFY_VERSION.ps1 not found. Cannot generate report."
            exit 1
          }
          .\scripts\VERIFY_VERSION.ps1 -Report

      - name: Upload version report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: version-verification-report
          path: VERSION_VERIFICATION_REPORT.md
          retention-days: 30

  workflow-version-policy:
    name: 🛡️ Workflow Version Normalization Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Enforce normalize-version in workflows
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $workflowFiles = Get-ChildItem -Path '.github/workflows/*.y*ml' -File
          $directReadPattern = '(?im)(?:\b(Get-Content|cat)\s+(?:-Raw\s+)?["'']?(?:\./|\.\\)?VERSION["'']?\b|<\s*["'']?(?:\./|\.\\)?VERSION["'']?)'
          $normalizePattern = '(?im)uses:\s*\.\/\.github\/actions\/normalize-version\b'
          $violations = @()

          foreach ($file in $workflowFiles) {
            $content = Get-Content -Path $file.FullName -Raw
            $hasDirectVersionRead = [regex]::IsMatch($content, $directReadPattern)
            $usesNormalizeVersion = [regex]::IsMatch($content, $normalizePattern)

            if ($hasDirectVersionRead -and -not $usesNormalizeVersion) {
              $violations += $file.FullName
            }
          }

          if ($violations.Count -gt 0) {
            Write-Error '❌ Workflow version policy violation detected.'
            Write-Host 'Files with direct VERSION reads but no normalize-version usage:' -ForegroundColor Yellow
            $violations | ForEach-Object { Write-Host " - $_" }
            exit 1
          }

          Write-Host '✅ Workflow version policy check passed.' -ForegroundColor Green

  # ============================================================================
  # PHASE 2: LINTING, SECRET SCANNING & CODE QUALITY
  # ============================================================================

  lint-backend:
    name: 🔍 Backend Linting (Python)
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python with dependency caching
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            src/backend/requirements.txt
            src/backend/requirements-dev.txt

      - name: Install dependencies (with cache)
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          if [ -f src/backend/requirements-dev.txt ]; then pip install -r src/backend/requirements-dev.txt; fi

      - name: Run Ruff linter
        run: |
          cd src/backend
          ruff check . --config=../../config/ruff.toml --output-format=github

      - name: Run MyPy type checker
        run: |
          # Run mypy from project root to avoid namespace conflicts
          mypy --config-file=config/mypy.ini src/backend --namespace-packages

  lint-frontend:
    name: 🔍 Frontend Linting (TypeScript/React)
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd src/frontend && npm ci --silent

      - name: Install Playwright browsers (with cache)
        run: cd src/frontend && npx playwright install --with-deps

      - name: Prepare installer Greek text assets
        shell: pwsh
        run: |
          Write-Host "Ensuring installer Greek text assets are regenerated"
          if (Test-Path "fix_greek_encoding_permanent.py") {
            python "fix_greek_encoding_permanent.py"
          } else {
            Write-Host "Skipping fix_greek_encoding_permanent.py (file not found)"
          }

      - name: Run ESLint
        # ESLint warnings tracked in docs/plans/UNIFIED_WORK_PLAN.md (Issue 1)
        # 240 warnings identified (161 `any` types, 23 console.log, others)
        # Warnings allowed by ESLint config; errors must fail CI
        # Refactoring PR planned for next maintenance cycle
        run: |
          cd src/frontend
          npm run lint

      - name: Check TypeScript compilation
        run: cd src/frontend && npx tsc --noEmit

  secret-scan:
    name: "🕵️ Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Gitleaks (with integrity verification)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.18.4"
          RELEASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          # Download the binary and checksums
          curl -sSL "${RELEASE_URL}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          curl -sSL "${RELEASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt

          # Verify integrity using SHA256
          echo "Verifying SHA256 checksum..."
          EXPECTED_SHA=$(grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" checksums.txt | awk '{print $1}')
          if [ -z "$EXPECTED_SHA" ]; then
            echo "⚠️  Could not find checksum in file, skipping verification"
          else
            ACTUAL_SHA=$(sha256sum gitleaks.tar.gz | awk '{print $1}')
            if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
              echo "❌ Gitleaks checksum verification failed. Possible corrupted or tampered release."
              echo "Expected: $EXPECTED_SHA"
              echo "Actual: $ACTUAL_SHA"
              exit 1
            fi
            echo "✅ Checksum verified"
          fi

          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks secret scan
        run: |
          gitleaks detect \
            --source . \
            --config config/.gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ============================================================================
  # PHASE 2b: TEST SCOPE DETERMINATION (Conditional Testing)
  # ============================================================================

  determine-test-scope:
    name: Determine Test Scope
    runs-on: ubuntu-latest
    outputs:
      run_full_tests: ${{ steps.scope.outputs.run_full }}
      run_e2e: ${{ steps.scope.outputs.run_e2e }}
      run_load: ${{ steps.scope.outputs.run_load }}
    steps:
      - name: Determine test scope based on trigger
        id: scope
        shell: bash
        run: |
          # Default: unit tests only (fast path on PR)
          RUN_FULL="false"
          RUN_E2E="false"
          RUN_LOAD="false"

          # Full tests on main branch
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            RUN_FULL="true"
            RUN_E2E="true"
            RUN_LOAD="true"
            echo "🔵 Main branch detected: Running full test suite"
          fi

          # Check for "requires:e2e" label on PR using GitHub API (works on all branches)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$LABELS" | grep -q "requires:e2e"; then
              RUN_E2E="true"
              echo "🟡 PR label 'requires:e2e' detected: Enabling E2E tests"
            fi
          fi

          # Check for "[full-test]" in PR title
          if echo "${{ github.event.pull_request.title }}" | grep -q "\[full-test\]"; then
            RUN_FULL="true"
            RUN_E2E="true"
            echo "🟡 PR title contains '[full-test]': Enabling all advanced tests"
          fi

          # Output results
          echo "run_full=$RUN_FULL" >> $GITHUB_OUTPUT
          echo "run_e2e=$RUN_E2E" >> $GITHUB_OUTPUT
          echo "run_load=$RUN_LOAD" >> $GITHUB_OUTPUT

          # Summary
          echo ""
          echo "📊 Test Scope Summary:"
          echo "  Full tests: $RUN_FULL"
          echo "  E2E tests: $RUN_E2E"
          echo "  Load tests: $RUN_LOAD"

  # ============================================================================
  # PHASE 3: AUTOMATED TESTING
  # ============================================================================

  test-backend:
    name: 🧪 Backend Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python with dependency caching
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            src/backend/requirements.txt
            src/backend/requirements-dev.txt

      - name: Install dependencies (with cache)
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          if [ -f src/backend/requirements-dev.txt ]; then pip install -r src/backend/requirements-dev.txt; fi

      - name: Run backend tests with coverage
        env:
          DISABLE_STARTUP_TASKS: '1'
          CSRF_ENABLED: '0'
          AUTH_MODE: 'strict'
          GITHUB_ACTIONS: 'true'
          CI: 'true'
          SMS_ALLOW_DIRECT_PYTEST: '1'
          SMS_TEST_RUNNER: 'batch'
        run: |
          cd src/backend
          pytest -v --cov=. --cov-report=html --cov-report=xml --cov-report=term-missing --html=pytest-report.html --self-contained-html --json-report --json-report-file=pytest-report.json

      - name: 🔒 Run path traversal security tests
        env:
          DISABLE_STARTUP_TASKS: '1'
          CSRF_ENABLED: '0'
          AUTH_MODE: 'strict'
          SMS_ALLOW_DIRECT_PYTEST: '1'
        run: |
          cd src/backend
          echo "Running path traversal security tests..."
          pytest tests/test_control_path_traversal.py -v --tb=short
          if [ $? -eq 0 ]; then
            echo "✅ Path traversal security tests PASSED"
          else
            echo "❌ Path traversal security tests FAILED"
            exit 1
          fi

      - name: Publish backend failing tests summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          report_path = Path("src/backend/pytest-report.json")

          if not summary_path:
            raise SystemExit("GITHUB_STEP_SUMMARY not set")

          lines = []

          if not report_path.exists():
            lines.append("### Backend failing tests")
            lines.append("- pytest-report.json not found (test runner may have failed before report generation).")
            with open(summary_path, "a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
            raise SystemExit(0)

          try:
            data = json.loads(report_path.read_text(encoding="utf-8"))
          except Exception as exc:  # pragma: no cover - CI diagnostic path
            lines.append("### Backend failing tests")
            lines.append(f"- Could not parse pytest-report.json: {exc}")
            with open(summary_path, "a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
            raise SystemExit(0)

          tests = data.get("tests") or []
          failed = [t for t in tests if t.get("outcome") in {"failed", "error"}]
          xfailed = [t for t in tests if t.get("outcome") == "xfailed"]

          lines.append("### Backend failing tests")

          if not failed:
            lines.append("- None (no failing tests)")
          else:
            lines.append(f"- Total failing tests: **{len(failed)}**")
            for t in failed[:30]:
              nodeid = t.get("nodeid", "<unknown test>")
              outcome = t.get("outcome", "failed")
              lines.append(f"- `{nodeid}` ({outcome})")

              call = t.get("call") or {}
              longrepr = call.get("longrepr")
              if isinstance(longrepr, str) and longrepr.strip():
                snippet = " ".join(longrepr.strip().splitlines()[:2])
                lines.append(f"  - {snippet[:300]}")

            if len(failed) > 30:
              lines.append(f"- ... and {len(failed) - 30} more")

          if xfailed:
            lines.append(f"- xfailed (expected failures): {len(xfailed)}")

          summary = data.get("summary") or {}
          if summary:
            lines.append(
              "- Summary: "
              f"passed={summary.get('passed', 0)}, "
              f"failed={summary.get('failed', 0)}, "
              f"errors={summary.get('error', summary.get('errors', 0))}, "
              f"skipped={summary.get('skipped', 0)}, "
              f"total={summary.get('total', 0)}"
            )

          with open(summary_path, "a", encoding="utf-8") as fh:
            fh.write("\n".join(lines) + "\n")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            src/backend/pytest-report.html
            src/backend/pytest-report.json
            src/backend/htmlcov/
          retention-days: 30

      - name: Publish backend coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          path = "src/backend/coverage.xml"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          if not summary_path:
            sys.exit("GITHUB_STEP_SUMMARY not set")

          if not os.path.exists(path):
            open(summary_path, "a", encoding="utf-8").write(
              "### Backend coverage\n- coverage.xml not found (tests may have failed).\n"
            )
            sys.exit(0)

          root = ET.parse(path).getroot()
          line_rate = float(root.attrib.get("line-rate", 0)) * 100
          branch_rate = float(root.attrib.get("branch-rate", 0)) * 100

          open(summary_path, "a", encoding="utf-8").write(
            f"### Backend coverage\n- Lines: {line_rate:.2f}%\n- Branches: {branch_rate:.2f}%\n"
          )
          PY

  test-frontend:
    name: 🧪 Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js with dependency caching
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies (with cache)
        run: cd src/frontend && npm ci --silent

      - name: Run frontend tests with coverage
        env:
          SMS_ALLOW_DIRECT_VITEST: '1'
          SMS_TEST_RUNNER: 'batch'
          CI: 'true'
          GITHUB_ACTIONS: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: cd src/frontend && npm run test -- --coverage --reporter=verbose --reporter=json --reporter=html --coverage.reporter=lcov --coverage.reporter=text-summary

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            src/frontend/coverage/
            src/frontend/test-results/
          retention-days: 30

      - name: Publish frontend coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import sys

          path = "src/frontend/coverage/lcov.info"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          if not summary_path:
            sys.exit("GITHUB_STEP_SUMMARY not set")

          if not os.path.exists(path):
            open(summary_path, "a", encoding="utf-8").write(
              "### Frontend coverage\n- lcov.info not found (tests may have failed).\n"
            )
            sys.exit(0)

          total_found = total_hit = branch_found = branch_hit = 0
          with open(path, "r", encoding="utf-8", errors="ignore") as f:
            for line in f:
              if line.startswith("LF:"):
                total_found += int(line.split(":", 1)[1])
              elif line.startswith("LH:"):
                total_hit += int(line.split(":", 1)[1])
              elif line.startswith("BRF:"):
                branch_found += int(line.split(":", 1)[1])
              elif line.startswith("BRH:"):
                branch_hit += int(line.split(":", 1)[1])

          line_rate = (total_hit / total_found * 100) if total_found else 0.0
          branch_rate = (branch_hit / branch_found * 100) if branch_found else 0.0

          open(summary_path, "a", encoding="utf-8").write(
            f"### Frontend coverage\n- Lines: {line_rate:.2f}% ({total_hit}/{total_found})\n- Branches: {branch_rate:.2f}% ({branch_hit}/{branch_found})\n"
          )
          PY

  smoke-tests:
    name: 💨 Smoke Tests (Server Startup Verification)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements*.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt

      - name: Create data directory
        run: mkdir -p ./data

      - name: Initialize test database
        env:
          DATABASE_URL: sqlite:///./data/test_smoke.db
        run: |
          echo "Running Alembic migrations for smoke tests..."
          cd ${{ github.workspace }} && python -c "import sys; sys.path.insert(0, 'src'); from backend.run_migrations import run_migrations; result = run_migrations(); exit(0 if result else 1)" || exit 1

      - name: Start backend server
        env:
          DISABLE_STARTUP_TASKS: '1'
          CSRF_ENABLED: '0'
          AUTH_MODE: 'permissive'
          DATABASE_URL: sqlite:///./data/test_smoke.db
        run: |
          python -m uvicorn src.backend.main:app --host 127.0.0.1 --port 8000 &
          echo $! > backend.pid
          sleep 3

      - name: Run health check endpoint
        run: |
          echo "🏥 Checking backend health..."
          curl -f -s http://127.0.0.1:8000/health | jq . || exit 1
          echo "✅ Backend health check passed"

      - name: Test core API endpoints
        run: |
          echo "🔍 Testing core API endpoints..."

          # Test students endpoint
          echo "Testing GET /api/v1/students..."
          curl -s http://127.0.0.1:8000/api/v1/students/ | jq . || echo "Students endpoint response"

          # Test courses endpoint
          echo "Testing GET /api/v1/courses..."
          curl -s http://127.0.0.1:8000/api/v1/courses/ | jq . || echo "Courses endpoint response"

          echo "✅ Core API endpoints responsive"

      - name: Cleanup
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  # ============================================================================
  # PHASE 3b: CONDITIONAL E2E & LOAD TESTING
  # ============================================================================

  run-e2e-tests:
    name: 🧪 End-to-End Tests (Conditional)
    runs-on: ubuntu-latest
    needs: [determine-test-scope, smoke-tests]
    if: needs.determine-test-scope.outputs.run_e2e == 'true'
    timeout-minutes: 30
    continue-on-error: ${{ github.ref != 'refs/heads/main' && github.event_name == 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd src/frontend && npm ci --silent

      - name: Install Playwright browsers
        run: cd src/frontend && npx playwright install --with-deps

      - name: Build frontend for E2E
        run: cd src/frontend && npm run ci:build

      - name: Start frontend preview server
        run: |
          cd src/frontend && npx vite preview --host 127.0.0.1 --port 5173 &
          echo $! > frontend-preview.pid
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:5173 > /dev/null 2>&1 && echo "✅ Frontend preview ready" && break
            sleep 2
          done

      - name: Setup Python for backend
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt

      - name: Create data directory
        run: mkdir -p ./data

      - name: Initialize database
        env:
          DATABASE_URL: sqlite:///./data/e2e_test.db
        run: |
          echo "Running Alembic migrations..."
          cd ${{ github.workspace }} && python -c "import sys; sys.path.insert(0, 'src'); from backend.run_migrations import run_migrations; result = run_migrations(); exit(0 if result else 1)" || exit 1

      - name: Seed test data
        env:
          DATABASE_URL: sqlite:///./data/e2e_test.db
        run: |
          echo "Seeding E2E test data..."
          python src/backend/seed_e2e_data.py

      - name: Start backend server in background
        env:
          DATABASE_URL: sqlite:///./data/e2e_test.db
          CSRF_ENABLED: '0'
          AUTH_MODE: permissive
          AUTH_LOGIN_THROTTLE_ENABLED: '0'
          AUTH_USER_LOCKOUT_ENABLED: '0'
          SERVE_FRONTEND: '0'
        run: |
          echo "Starting backend server..."
          export PYTHONPATH="${{ github.workspace }}/src"
          cd ${{ github.workspace }} && python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          echo $! > backend.pid
          sleep 3

          echo "Waiting for backend health check..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HEALTH=$(curl -s http://127.0.0.1:8000/health 2>&1 || echo "FAILED")
            if echo "$HEALTH" | grep -q '"status"'; then
              echo "✅ Backend is ready (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              break
            fi
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Backend failed to start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run E2E tests with Playwright
        working-directory: ./src/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          DEBUG: pw:api
          VITE_API_URL: http://127.0.0.1:8000/api/v1
        timeout-minutes: 25
        run: |
          echo "🧪 Running E2E tests..."
          npm run e2e -- --reporter=list --workers=1 --timeout=120000 --max-failures=20

      - name: Kill backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            echo "Stopping backend (PID: $(cat backend.pid))..."
            kill $(cat backend.pid) 2>/dev/null || echo "Backend already stopped"
            rm backend.pid
          fi

      - name: Kill frontend preview
        if: always()
        run: |
          if [ -f frontend-preview.pid ]; then
            echo "Stopping frontend preview (PID: $(cat frontend-preview.pid))..."
            kill $(cat frontend-preview.pid) 2>/dev/null || echo "Preview already stopped"
            rm -f frontend-preview.pid
          fi

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_id }}
          path: |
            src/frontend/playwright-report/
            src/frontend/test-results/
          retention-days: 30
          if-no-files-found: ignore

  run-load-tests:
    name: 📊 Load & Performance Tests (Conditional)
    runs-on: ubuntu-latest
    needs: [determine-test-scope, smoke-tests]
    if: needs.determine-test-scope.outputs.run_load == 'true'
    timeout-minutes: 30
    continue-on-error: ${{ github.ref != 'refs/heads/main' && github.event_name == 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python for backend & load tests
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install locust requests

      - name: Create data directory
        run: mkdir -p ./data

      - name: Initialize database
        env:
          DATABASE_URL: sqlite:///./data/load_test.db
        run: |
          echo "Running Alembic migrations..."
          cd ${{ github.workspace }} && python -c "import sys; sys.path.insert(0, 'src'); from backend.run_migrations import run_migrations; result = run_migrations(); exit(0 if result else 1)" || exit 1

      - name: Seed test data
        env:
          DATABASE_URL: sqlite:///./data/load_test.db
        run: |
          echo "Seeding load test data..."
          cd ${{ github.workspace }} && python src/backend/seed_e2e_data.py

      - name: Start backend server in background
        env:
          DATABASE_URL: sqlite:///./data/load_test.db
          CSRF_ENABLED: '0'
          AUTH_MODE: disabled
          AUTH_ENABLED: 'false'
          RATE_LIMIT_AUTH_PER_MINUTE: '1000000'
          RATE_LIMIT_READ_PER_MINUTE: '1000000'
          RATE_LIMIT_WRITE_PER_MINUTE: '1000000'
        run: |
          echo "Starting backend server for load tests..."
          export PYTHONPATH="${{ github.workspace }}/src"
          cd ${{ github.workspace }} && python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          echo $! > backend.pid
          sleep 3

          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/health > /dev/null; then
              echo "✅ Backend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Backend failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Create artifacts directory
        run: mkdir -p ci-artifacts

      - name: Run load tests
        run: |
          echo "📊 Running load tests..."
          python scripts/run_load_tests.py \
            --host http://127.0.0.1:8000 \
            --users 50 \
            --spawn-rate 10 \
            --duration 60 \
            --output ci-artifacts/load-test-results.json \
            || echo "⚠️  Load tests failed (continuing due to continue-on-error)"

      - name: Kill backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) 2>/dev/null || true
            rm backend.pid
          fi

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_id }}
          path: ci-artifacts/load-test-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # PHASE 4: BUILD & PACKAGE
  # ============================================================================

  build-frontend:
    name: 🏗️ Build Frontend (Production)
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: cd src/frontend && npm ci --silent

      - name: Build production bundle
        env:
          VITE_API_URL: /api/v1
          NODE_ENV: production
        run: cd src/frontend && npm run ci:build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          retention-days: 30

      - name: Upload build stats
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-stats
          path: src/frontend/.vite/stats.json
          retention-days: 7
          if-no-files-found: ignore
        if: always()

  build-docker-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend]
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Normalize version from VERSION file
        id: version
        uses: ./.github/actions/normalize-version

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version_tag }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image (with caching)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/docker-old/Dockerfile.fullstack
          # Push policy (explicit rules to avoid accidental pushes):
          # - On release tags (v1.*.*): Always push to GHCR
          # - On main branch: Push only if GHCR_TOKEN explicitly configured
          # - On PR: Never push (build only for validation)
          push: ${{ github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v1.') || (github.ref == 'refs/heads/main' && secrets.GHCR_TOKEN != '')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version_core }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ============================================================================
  # PHASE 5: SECURITY SCANNING
  # ============================================================================

  security-scan-backend:
    name: 🔒 Security Scan (Backend)
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    # Parallelized: runs after linting, not after testing
    # pip-audit is the single source of truth for CVE detection (faster, more accurate than Safety)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python with dependency caching
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            src/backend/requirements.txt
            src/backend/requirements-dev.txt

      - name: Install dependencies (with cache)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r src/backend/requirements.txt

      - name: Run pip-audit for CVE detection (primary security tool)
        run: |
          pip-audit --desc --format json > backend-audit.json || true
          pip-audit --desc --format markdown > backend-audit.md || true
          echo "✅ pip-audit scan complete"

      - name: Convert pip-audit to SARIF format
        run: |
          python - <<'PY'
          import json

          # Load pip-audit JSON report
          with open('backend-audit.json') as f:
              data = json.load(f)

          # Convert to SARIF format
          sarif = {
              'version': '2.1.0',
              '$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'pip-audit',
                          'version': '2.4.14',
                          'informationUri': 'https://github.com/pypa/pip-audit'
                      }
                  },
                  'results': []
              }]
          }

          # Convert vulnerabilities to SARIF results
          vulnerability_count = 0
          for dependency in data.get('dependencies', []) or []:
              dependency_name = dependency.get('name', 'unknown')
              dependency_version = dependency.get('version', 'unknown')
              for vuln in dependency.get('vulns', []) or []:
                  vulnerability_count += 1
                  fix_versions = vuln.get('fix_versions', []) or []
                  message_text = (
                      f"{dependency_name} {dependency_version}: "
                      f"{vuln.get('description', 'Security vulnerability')}"
                  )
                  if fix_versions:
                      message_text += f" (fix versions: {', '.join(fix_versions)})"

                  result = {
                      'ruleId': vuln.get('id', 'PIP-AUDIT'),
                      'message': {
                          'text': message_text
                      },
                      'level': 'warning' if fix_versions else 'error',
                      'locations': [{
                          'physicalLocation': {
                              'artifactLocation': {
                                  'uri': 'src/backend/requirements.txt'
                              }
                          }
                      }]
                  }
                  sarif['runs'][0]['results'].append(result)

          # Save SARIF
          with open('backend-audit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print(f"✅ Converted {vulnerability_count} vulnerabilities to SARIF")
          PY

      - name: Summarize pip-audit results
        run: |
          python - <<'PY'
          import json
          import sys

          try:
              with open('backend-audit.json') as f:
                  data = json.load(f)
          except Exception as e:
              print(f"⚠️  Could not parse pip-audit report: {e}")
              sys.exit(0)  # Non-fatal

          vulnerability_entries = []
          for dependency in data.get('dependencies', []) or []:
              for vuln in dependency.get('vulns', []) or []:
                  vulnerability_entries.append((dependency, vuln))

          if vulnerability_entries:
              fixable_count = sum(1 for _, vuln in vulnerability_entries if vuln.get('fix_versions'))
              print(f"⚠️  Found {len(vulnerability_entries)} vulnerability entries")
              print(f"  Fixable: {fixable_count}")
              for dependency, vuln in vulnerability_entries[:5]:
                  fix_versions = vuln.get('fix_versions', []) or []
                  fix_note = f" (fix versions: {', '.join(fix_versions)})" if fix_versions else ""
                  print(
                      f"  - {dependency.get('name', 'unknown')} {dependency.get('version', 'unknown')}: "
                      f"{vuln.get('id', 'unknown')} {vuln.get('description', 'no description')}{fix_note}"
                  )
              if len(vulnerability_entries) > 5:
                  print(f"  ... and {len(vulnerability_entries) - 5} more")
          else:
              print("✅ No vulnerabilities found")
          PY

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            backend-audit.*
          retention-days: 30

      - name: Validate backend SARIF format
        if: always() && hashFiles('backend-audit.sarif') != ''
        run: |
          echo "Validating backend SARIF format..."
          python -m json.tool backend-audit.sarif > /dev/null && echo "✅ Backend SARIF valid" || echo "⚠️  Backend SARIF malformed"
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('backend-audit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-audit.sarif
          category: 'backend-security'
        continue-on-error: true

      - name: Publish security summary to GitHub
        if: always()
        run: |
          python - <<'PY'
          import json
          import os

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_path:
              print("GITHUB_STEP_SUMMARY not available")
              exit(0)

          try:
              with open('backend-audit.json') as f:
                  data = json.load(f)
                  vulns = [vuln for dependency in data.get('dependencies', []) or [] for vuln in dependency.get('vulns', []) or []]

              with open(summary_path, 'a') as f:
                  f.write("### Backend Security Scan\n")
                  f.write(f"- **Tool:** pip-audit (CVE detection)\n")
                  f.write(f"- **Total vulnerabilities:** {len(vulns)}\n")
                  if vulns:
                      fixable = [v for v in vulns if v.get('fix_versions')]
                      f.write(f"- **Fixable:** {len(fixable)}\n")
          except Exception as e:
              print(f"Error parsing report: {e}")
          PY

  security-scan-frontend:
    name: 🔒 Security Scan (Frontend)
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    # Parallelized: runs after linting, not after testing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: cd src/frontend && npm ci --silent

      - name: Run npm audit
        run: cd src/frontend && npm audit --omit=dev --json > npm-audit.json || true

      - name: Check npm audit results
        run: |
          cd src/frontend
          if npm audit --omit=dev --audit-level=moderate > /dev/null 2>&1; then
            echo "✓ No moderate or higher security vulnerabilities found"
          else
            echo "⚠ Security vulnerabilities detected"
            npm audit --omit=dev --audit-level=moderate
            exit 1
          fi

      - name: Convert npm-audit to SARIF format
        if: always()
        run: |
          cd src/frontend
          python - <<'PY'
          import json

          # Load npm audit JSON report
          with open('npm-audit.json') as f:
              data = json.load(f)

          # Convert to SARIF format
          sarif = {
              'version': '2.1.0',
              '$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'npm-audit',
                          'version': data.get('metadata', {}).get('npmVersion', 'unknown'),
                          'informationUri': 'https://docs.npmjs.com/cli/audit'
                      }
                  },
                  'results': []
              }]
          }

          # Convert vulnerabilities to SARIF results
          for package_name, vuln_data in (data.get('vulnerabilities', {}) or {}).items():
              severity = str(vuln_data.get('severity', 'unknown')).lower()
              fix_available = vuln_data.get('fixAvailable', False)
              if isinstance(fix_available, dict):
                  fix_available = True

              range_text = vuln_data.get('range', 'unknown range')
              message_text = f"NPM dependency vulnerability: {package_name} ({severity}, range: {range_text})"
              if fix_available:
                  message_text += " (fix available)"

              result = {
                  'ruleId': package_name,
                  'message': {
                      'text': message_text
                  },
                  'level': 'error' if severity in ['critical', 'high'] else 'warning',
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {
                              'uri': 'src/frontend/package-lock.json'
                          }
                      }
                  }]
              }
              sarif['runs'][0]['results'].append(result)

          # Save SARIF
          with open('frontend-audit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print(f"✅ Converted npm-audit to SARIF")
          PY

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-reports
          path: |
            src/frontend/npm-audit.json
            src/frontend-audit.sarif
          retention-days: 30

      - name: Validate frontend SARIF format
        if: always() && hashFiles('src/frontend-audit.sarif') != ''
        run: |
          echo "Validating frontend SARIF format..."
          python -m json.tool src/frontend-audit.sarif > /dev/null && echo "✅ Frontend SARIF valid" || echo "⚠️  Frontend SARIF malformed"
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('src/frontend-audit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: src/frontend-audit.sarif
          category: 'frontend-security'
        continue-on-error: true

  security-scan-docker:
    name: 🔒 Security Scan (Docker Images)
    runs-on: ubuntu-latest
    needs: [build-docker-images]
    # CRITICAL: Must wait for Docker images to be built before scanning
    # Ensures images are built AND security-scanned before deployment gates evaluate them
    # Runs on all events (including PRs) for early vulnerability detection
    permissions:
      security-events: write
      contents: read
    # Non-blocking on PRs (detection during review), blocking on main/releases
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Trivy on local filesystem for Dockerfiles
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './infra/docker'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
        continue-on-error: true

  # ============================================================================
  # PHASE 5b: SARIF CONSOLIDATION (Phase 4 Feature)
  # ============================================================================

  consolidate-sarif-reports:
    name: 🔐 Consolidate Security Scan Results
    runs-on: ubuntu-latest
    needs: [security-scan-backend, security-scan-frontend, security-scan-docker]
    if: always()
    permissions:
      security-events: write
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: sarif-files

      - name: Consolidate SARIF reports
        run: |
          echo "Checking for SARIF artifacts before consolidation..."
          if ! find sarif-files -name "*.sarif" -type f | head -5; then
            echo "⚠️  No SARIF files found in artifacts"
          fi

          python scripts/consolidate-sarif.py \
            --backend sarif-files/backend-security-reports/backend-audit.sarif \
            --frontend sarif-files/frontend-security-reports/frontend-audit.sarif \
            --docker sarif-files/trivy-results.sarif \
            --output unified-audit-results.sarif || echo "⚠️  SARIF consolidation warning (non-blocking)"
        continue-on-error: true

      - name: Upload consolidated SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: unified-audit-results.sarif
          category: 'unified-security-audit'
        continue-on-error: true

  # ============================================================================
  # PHASE 6: DOCUMENTATION & CLEANUP
  # ============================================================================

  cleanup-and-docs:
    name: 📚 Documentation & Cleanup Validation
    runs-on: ubuntu-latest
    needs: [version-verification, workflow-version-policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify documentation consistency
        run: |
          set -euo pipefail

          echo "🔍 Checking documentation TODOs..."
          TODO_COUNT=$(grep -r "TODO\|FIXME\|XXX" docs/ \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=archive \
            --exclude-dir=docs/archive \
            --exclude-dir=docs/reports \
            --exclude-dir=docs/releases/reports \
            --exclude-dir=docs/development/sessions \
            2>/dev/null | wc -l || echo 0)
          echo "Found $TODO_COUNT TODO items in documentation"

          if [ "$TODO_COUNT" -gt 50 ]; then
            echo "::warning::High number of TODO items in documentation ($TODO_COUNT)"
          fi

      - name: Check for obsolete files
        run: |
          set -euo pipefail

          echo "🧹 Checking for deprecated/obsolete files..."
          find . -type f \( -name "*.deprecated" -o -name "*.obsolete" -o -name "*.bak" \) | tee obsolete-files.txt || true

          OBSOLETE_COUNT=$(wc -l < obsolete-files.txt)
          if [ "$OBSOLETE_COUNT" -gt 0 ]; then
            echo "::warning::Found $OBSOLETE_COUNT obsolete files"
            cat obsolete-files.txt
          fi

      - name: Validate markdown links
        shell: bash
        run: |
          echo "ℹ️ Markdown link validation skipped (external action not allowed)"
          echo "To validate locally: npm install -g markdown-link-check && markdown-link-check README.md"

      - name: Generate documentation index
        run: |
          echo "# Documentation Index" > DOCS_INDEX.md
          echo "" >> DOCS_INDEX.md
          echo "Generated: $(date)" >> DOCS_INDEX.md
          echo "" >> DOCS_INDEX.md
          find docs/ -name "*.md" -type f | sort >> DOCS_INDEX.md

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation-index
          path: DOCS_INDEX.md
          retention-days: 7

  release-asset-lock:
    name: 🔐 Release Asset Mutation Lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Enforce release asset mutation policy
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking release asset mutation commands across workflows (repo-level gate)..."

          mapfile -t GH_UPLOAD_HITS < <(
            grep -RIn --include='*.yml' --include='*.yaml' \
              -E '^[[:space:]]*gh[[:space:]]+release[[:space:]]+upload\b|release",[[:space:]]*"upload"' .github/workflows || true
          )

          mapfile -t API_UPLOAD_HITS < <(
            grep -RIn --include='*.yml' --include='*.yaml' \
              -E 'uploadReleaseAsset[[:space:]]*\(|repos\.uploadReleaseAsset\b' .github/workflows || true
          )

          UPLOAD_HITS=("${GH_UPLOAD_HITS[@]}" "${API_UPLOAD_HITS[@]}")

          if [ ${#UPLOAD_HITS[@]} -eq 0 ]; then
            echo "❌ No release asset upload commands found at all."
            echo "Expected installer workflow to manage installer asset upload path."
            exit 1
          fi

          echo "Found potential release asset upload commands:"
          printf '  %s\n' "${UPLOAD_HITS[@]}"

          for hit in "${UPLOAD_HITS[@]}"; do
            if [[ "$hit" != *".github/workflows/release-installer-with-sha.yml"* ]]; then
              echo "❌ Policy violation: non-installer workflow uploads release assets"
              echo "Offending entry: $hit"
              exit 1
            fi
          done

          mapfile -t DELETE_HITS < <(
            grep -RIn --include='*.yml' --include='*.yaml' \
              -E '^[[:space:]]*gh[[:space:]]+release[[:space:]]+delete-asset\b|release",[[:space:]]*"delete-asset"' .github/workflows || true
          )

          if [ ${#DELETE_HITS[@]} -gt 0 ]; then
            echo "Found potential release asset delete commands:"
            printf '  %s\n' "${DELETE_HITS[@]}"

            for hit in "${DELETE_HITS[@]}"; do
              if [[ "$hit" != *".github/workflows/release-installer-with-sha.yml"* && "$hit" != *".github/workflows/release-asset-sanitizer.yml"* ]]; then
                echo "❌ Policy violation: unauthorized workflow deletes release assets"
                echo "Offending entry: $hit"
                exit 1
              fi
            done
          fi

          echo "✅ Release asset mutation policy passed (upload: installer only, delete: installer/sanitizer only)"

  # Gate job pattern (reuse for future deploy/release gates):
  # 1. Keep policy evaluation in a small ubuntu-latest job.
  # 2. Read event/inputs/vars/secrets into env once.
  # 3. Emit normalized outputs such as should_deploy and resolved URLs.
  # 4. Let self-hosted execution jobs depend on gate outputs only.
  # This keeps execution jobs readable and isolates optional-config warning noise.

  staging-deploy-gate:
    name: 🚦 Evaluate Staging Deployment Gate
    runs-on: ubuntu-latest
    needs: [build-docker-images, security-scan-docker, cleanup-and-docs]
    # Pattern: evaluate policy once, then export normalized values for the real deploy job.
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
      staging_url: ${{ steps.gate.outputs.staging_url }}
    env:
      EVENT_NAME: ${{ github.event_name }}
      REF_NAME: ${{ github.ref }}
      ACTOR: ${{ github.actor }}
      INPUT_DEPLOY_ENV: ${{ inputs.deploy_environment || '' }}
      AUTO_DEPLOY_ON_PUSH: ${{ vars['AUTO_DEPLOY_ON_PUSH'] }}
      STAGING_DEPLOY_ENABLED: ${{ vars['STAGING_DEPLOY_ENABLED'] }}
      STAGING_URL_RAW: ${{ vars['STAGING_URL'] }}
      DEPLOY_HOST_RAW: ${{ secrets['DEPLOY_HOST'] || vars['DEPLOY_HOST'] }}
    steps:
      - name: Resolve staging gate
        id: gate
        shell: pwsh
        run: |
          $shouldDeploy = $false
          $stagingUrl = $env:STAGING_URL_RAW
          $deployHost = $env:DEPLOY_HOST_RAW

          if ([string]::IsNullOrWhiteSpace($stagingUrl) -and -not [string]::IsNullOrWhiteSpace($deployHost)) {
            $stagingUrl = "https://$deployHost"
          }

          Write-Host "🚦 Staging Deployment Gate Evaluation" -ForegroundColor Cyan
          Write-Host "  Event: $env:EVENT_NAME"
          Write-Host "  Deploy Env Input: $env:INPUT_DEPLOY_ENV"
          Write-Host "  STAGING_DEPLOY_ENABLED: $env:STAGING_DEPLOY_ENABLED"
          Write-Host "  AUTO_DEPLOY_ON_PUSH: $env:AUTO_DEPLOY_ON_PUSH"
          Write-Host "  Staging URL: $stagingUrl"
          Write-Host ""

          # Only allow explicit workflow_dispatch or workflow_call
          if ($env:EVENT_NAME -eq 'workflow_dispatch' -and $env:INPUT_DEPLOY_ENV -eq 'staging') {
            Write-Host "✅ Deployment triggered by manual workflow_dispatch" -ForegroundColor Green
            $shouldDeploy = $true
          }
          elseif ($env:EVENT_NAME -eq 'workflow_call' -and $env:INPUT_DEPLOY_ENV -eq 'staging') {
            Write-Host "✅ Deployment triggered by workflow_call" -ForegroundColor Green
            $shouldDeploy = $true
          }
          else {
            Write-Host "⏭️  Automatic staging deployment disabled. Use workflow_dispatch to deploy manually." -ForegroundColor Yellow
            if ([string]::IsNullOrWhiteSpace($stagingUrl)) {
              Write-Host "  Note: STAGING_URL not configured. Set it in repository variables to enable deployments." -ForegroundColor Gray
            }
          }

          "should_deploy=$($shouldDeploy.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "staging_url=$stagingUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  production-deploy-gate:
    name: 🚦 Evaluate Production Deployment Gate
    runs-on: ubuntu-latest
    needs: [build-docker-images, security-scan-docker, cleanup-and-docs]
    # Pattern: evaluate policy once, then export normalized values for the real deploy job.
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
      prod_url: ${{ steps.gate.outputs.prod_url }}
      deploy_host: ${{ steps.gate.outputs.deploy_host }}
    env:
      EVENT_NAME: ${{ github.event_name }}
      REF_NAME: ${{ github.ref }}
      INPUT_DEPLOY_ENV: ${{ inputs.deploy_environment || '' }}
      AUTO_DEPLOY_ON_PUSH: ${{ vars['AUTO_DEPLOY_ON_PUSH'] }}
      PROD_DEPLOY_ENABLED: ${{ vars['PROD_DEPLOY_ENABLED'] }}
      PROD_URL_RAW: ${{ vars['PROD_URL'] }}
      DEPLOY_HOST_RAW: ${{ secrets['DEPLOY_HOST'] || vars['DEPLOY_HOST'] }}
    steps:
      - name: Resolve production gate
        id: gate
        shell: pwsh
        run: |
          $shouldDeploy = $false
          $prodUrl = $env:PROD_URL_RAW
          $deployHost = $env:DEPLOY_HOST_RAW

          if ([string]::IsNullOrWhiteSpace($prodUrl) -and -not [string]::IsNullOrWhiteSpace($deployHost)) {
            $prodUrl = "https://$deployHost"
          }

          if ($env:EVENT_NAME -eq 'workflow_dispatch' -and $env:INPUT_DEPLOY_ENV -eq 'production' -and $env:PROD_DEPLOY_ENABLED -eq 'true') {
            $shouldDeploy = $true
          }
          elseif ($env:EVENT_NAME -eq 'workflow_call' -and $env:INPUT_DEPLOY_ENV -eq 'production' -and $env:PROD_DEPLOY_ENABLED -eq 'true') {
            $shouldDeploy = $true
          }
          elseif (
            $env:EVENT_NAME -eq 'push' -and
            $env:REF_NAME -eq 'refs/heads/main' -and
            $env:PROD_DEPLOY_ENABLED -eq 'true' -and
            $env:AUTO_DEPLOY_ON_PUSH -eq 'true'
          ) {
            $shouldDeploy = $true
          }

          "should_deploy=$($shouldDeploy.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "prod_url=$prodUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "deploy_host=$deployHost" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  # ============================================================================
  # PHASE 7: DEPLOYMENT TO STAGING
  # ============================================================================

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: [self-hosted, windows, staging-lan]
    needs: [staging-deploy-gate]
    # Execution job pattern: consume gate outputs only; avoid embedding policy logic here.
    if: needs.staging-deploy-gate.outputs.should_deploy == 'true'
    environment:
      name: staging
      url: ${{ needs.staging-deploy-gate.outputs.staging_url }}
    env:
      STAGING_URL: ${{ needs.staging-deploy-gate.outputs.staging_url }}
    steps:
      - name: Check runner availability
        id: runner_check
        shell: pwsh
        run: |
          Write-Host "🔍 Verifying self-hosted runner is available..." -ForegroundColor Cyan
          Write-Host "  Runner labels: self-hosted, windows, staging-lan"
          Write-Host "  Runner OS: $env:RUNNER_OS"
          Write-Host "  Runner name: $env:RUNNER_NAME"

          if ([string]::IsNullOrWhiteSpace($env:RUNNER_NAME)) {
            Write-Warning "⚠️  Runner information unavailable. Deployment may fail if runner not properly registered."
          } else {
            Write-Host "✅ Runner available: $env:RUNNER_NAME" -ForegroundColor Green
          }

      - name: Normalize Git settings (self-hosted runner)
        shell: pwsh
        run: |
          git config --global core.useBuiltinFSMonitor false
          git config --global core.fsmonitor false
          git config --global advice.useCoreFSMonitorConfig false
          git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize version from VERSION file
        id: version
        uses: ./.github/actions/normalize-version

      - name: Stop existing staging stack (safe)
        shell: pwsh
        run: |
          if (Test-Path ".\DOCKER.ps1") {
            .\DOCKER.ps1 -Stop
          }

      - name: Verify runner connectivity and health
        shell: pwsh
        run: |
          Write-Host "Verifying self-hosted runner connectivity..." -ForegroundColor Cyan

          # Test network connectivity to GitHub
          $testHosts = @("github.com", "1.1.1.1")
          foreach ($host in $testHosts) {
            Write-Host "  Testing connectivity to $host..." -ForegroundColor Gray
            $ping = Test-NetConnection -ComputerName $host -Port 443 -InformationLevel Quiet -ErrorAction SilentlyContinue
            if ($ping) {
              Write-Host "    ✅ Connected" -ForegroundColor Green
            } else {
              Write-Host "    ⚠️  No response from $host" -ForegroundColor Yellow
            }
          }

          # Check available disk space
          $drives = Get-Volume | Where-Object {$_.DriveLetter -and $_.SizeRemaining -gt 0}
          foreach ($drive in $drives) {
            $percentFree = [Math]::Round(($drive.SizeRemaining / $drive.Size) * 100, 1)
            if ($percentFree -lt 10) {
              Write-Warning "⚠️  Drive $($drive.DriveLetter): is $percentFree% full - may cause issues"
            }
          }

          Write-Host "✅ Runner health check complete" -ForegroundColor Green

      - name: Free port 8080 if occupied
        shell: pwsh
        run: |
          Write-Host "🔍 Checking for containers on port 8080..." -ForegroundColor Cyan
          try {
            # Check if docker is available
            $dockerTest = docker version 2>&1 | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "⚠️  Docker is not available or not running. Skipping port cleanup." -ForegroundColor Yellow
              exit 0
            }

            # Get containers on port 8080
            $portContainers = docker ps --filter "publish=8080" --format "{{.ID}}" 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "⚠️  Could not query Docker containers. Skipping port cleanup." -ForegroundColor Yellow
              exit 0
            }

            if ($portContainers -and $portContainers.Count -gt 0) {
              Write-Warning "Port 8080 is in use. Stopping $($portContainers.Count) container(s)..."
              foreach ($id in $portContainers) {
                Write-Host "  Stopping container: $id"
                docker stop $id 2>&1 | Out-Null
                docker rm $id 2>&1 | Out-Null
              }
              Write-Host "✅ Port cleanup completed" -ForegroundColor Green
            } else {
              Write-Host "✅ Port 8080 is free" -ForegroundColor Green
            }
          } catch {
            Write-Host "⚠️  Error during port cleanup (non-fatal): $_" -ForegroundColor Yellow
            exit 0
          }

      - name: Ensure Docker is running (runner health check)
        shell: pwsh
        run: |
          Write-Host "Ensuring Docker is running..." -ForegroundColor Cyan

          $dockerBinCandidates = @(
            "C:\Program Files\Docker\Docker\resources\bin",
            "C:\Program Files\Docker\Docker\resources"
          )

          foreach ($path in $dockerBinCandidates) {
            if ((Test-Path -LiteralPath $path) -and ($env:Path -notlike "*$path*")) {
              $env:Path = "$path;$env:Path"
              Add-Content -Path $env:GITHUB_PATH -Value $path
            }
          }

          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Error "Docker command not found in PATH after normalization"
            exit 1
          }

          try {
            Start-Service -Name "com.docker.service" -ErrorAction SilentlyContinue | Out-Null
          } catch {
            # Service may not exist in all environments
          }

          $desktopCandidates = @(
            "C:\Program Files\Docker\Docker\Docker Desktop.exe",
            "C:\Program Files\Docker\Docker\Docker.exe"
          )

          foreach ($candidate in $desktopCandidates) {
            if (Test-Path $candidate) {
              Start-Process -FilePath $candidate -ErrorAction SilentlyContinue | Out-Null
              break
            }
          }

          # Check if Docker daemon/process is running
          # For service accounts, we check process existence rather than docker ps execution
          $maxAttempts = 12
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            # Try docker ps first (works if runner has Docker access)
            docker ps > $null 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker is available and running (verified via docker ps)" -ForegroundColor Green
              exit 0
            }

            # Fallback: check if Docker process is actually running
            $dockerProcess = Get-Process docker, dockerd, "Docker Desktop" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dockerProcess) {
              Write-Host "Docker process detected ($($dockerProcess.ProcessName)) - proceeding with deployment" -ForegroundColor Green
              exit 0
            }

            Write-Host "  Waiting for Docker to start ($attempt/$maxAttempts)..." -ForegroundColor Gray
            Start-Sleep -Seconds 3
          }

          Write-Error "Docker failed to start after $maxAttempts attempts"
          exit 1

      - name: Docker status snapshot
        shell: pwsh
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Warning "Docker command not found; skipping status snapshot"
            exit 0
          }

          Write-Host "Docker version:" -ForegroundColor Cyan
          docker version

          Write-Host "Docker info:" -ForegroundColor Cyan
          docker info

          Write-Host "Docker containers:" -ForegroundColor Cyan
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Deploy to staging server
        shell: pwsh
        run: |
          Write-Host "🚀 Deploying version ${{ steps.version.outputs.version }} to staging..."
          if (-not (Test-Path ".\DOCKER.ps1")) {
            Write-Error "DOCKER.ps1 not found in repository root. Cannot deploy staging."
            exit 1
          }

          .\DOCKER.ps1 -Update
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Staging deployment failed (DOCKER.ps1 -Update)"
            exit $LASTEXITCODE
          }

          Write-Host "✅ Staging deployment updated"

      - name: Run post-deployment health check
        shell: pwsh
        run: |
          Write-Host "🏥 Running health checks on staging..."
          $stagingUrl = $env:STAGING_URL
          $maxAttempts = 20
          $currentDelayMs = 1000
          $maxDelayMs = 20000

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Health check attempt $attempt/$maxAttempts at $(Get-Date -Format 'HH:mm:ss')..."
            try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri "$stagingUrl/health" -TimeoutSec 10
              if ($response.StatusCode -eq 200 -and $response.Content -match '"status"') {
                Write-Host "✅ Staging health check passed" -ForegroundColor Green
                $response.Content | Write-Host
                exit 0
              }
            } catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)" -ForegroundColor Yellow
            }

            # Exponential backoff with reduced window to maintain ~5 minute timeout
            # Pattern: 1s, 1.5s, 2.25s, 3.375s, 5s, 7.5s, 11s, 16s, 20s, 20s...
            $nextDelayMs = [Math]::Min([int]($currentDelayMs * 1.5), $maxDelayMs)
            $delaySec = [Math]::Round($nextDelayMs / 1000, 1)
            Write-Host "Waiting ${delaySec}s before next attempt..." -ForegroundColor Gray
            Start-Sleep -Milliseconds $nextDelayMs
            $currentDelayMs = $nextDelayMs
          }

          Write-Error "❌ Staging health check failed after $maxAttempts attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Commit: ${{ github.sha }}"

  # ============================================================================
  # PHASE 8: DEPLOYMENT TO PRODUCTION
  # ============================================================================

  deploy-production:
    name: 🎯 Deploy to Production
    runs-on: [self-hosted, windows, production-lan]
    needs: [production-deploy-gate]
    # Execution job pattern: consume gate outputs only; avoid embedding policy logic here.
    if: needs.production-deploy-gate.outputs.should_deploy == 'true'
    environment:
      name: production
      url: ${{ needs.production-deploy-gate.outputs.prod_url }}
    env:
      PROD_URL: ${{ needs.production-deploy-gate.outputs.prod_url }}
      DEPLOY_HOST: ${{ needs.production-deploy-gate.outputs.deploy_host }}
    steps:
      - name: Check production deployment prerequisites
        shell: pwsh
        run: |
          Write-Host "🔍 Checking production deployment prerequisites..." -ForegroundColor Cyan
          $prodUrlSet = -not [string]::IsNullOrWhiteSpace($env:PROD_URL)
          $deployHostSet = -not [string]::IsNullOrWhiteSpace($env:DEPLOY_HOST)

          if (-not ($prodUrlSet -or $deployHostSet)) {
            Write-Host "⚠️  PROD_URL and DEPLOY_HOST are both empty. Skipping production deployment." -ForegroundColor Yellow
            Write-Host ''
            Write-Host 'To enable production deployment, configure in GitHub:' -ForegroundColor Cyan
            Write-Host '1. Repo → Settings → Environments → production' -ForegroundColor Yellow
            Write-Host '   Add Variables:' -ForegroundColor Yellow
            Write-Host '   - PROD_URL (e.g., https://sms.example.com)' -ForegroundColor Yellow
            Write-Host '   - or DEPLOY_HOST (e.g., sms.example.com)' -ForegroundColor Yellow
            Write-Host '2. Add Secrets (optional):' -ForegroundColor Yellow
            Write-Host '   - DEPLOY_HOST (if not in vars)' -ForegroundColor Yellow
            Write-Host '   - DEPLOY_USER (default: deploy)' -ForegroundColor Yellow
            Write-Host '3. Register self-hosted runner with labels: self-hosted, windows, production-lan' -ForegroundColor Yellow
            exit 0
          }

          Write-Host "✅ Prerequisites met. Proceeding with production deployment." -ForegroundColor Green
          Write-Host "PROD_URL: $env:PROD_URL" -ForegroundColor Cyan
          if ($deployHostSet) {
            Write-Host "DEPLOY_HOST: $env:DEPLOY_HOST" -ForegroundColor Cyan
          }

      - name: Normalize Git settings (self-hosted runner)
        shell: pwsh
        run: |
          git config --global core.useBuiltinFSMonitor false
          git config --global core.fsmonitor false
          git config --global advice.useCoreFSMonitorConfig false
          git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve version source
        id: version_source
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v1.*') {
            $versionRaw = $env:GITHUB_REF -replace '^refs/tags/', ''
          } else {
            $versionRaw = ''
          }
          "version=$versionRaw" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Normalize resolved version
        id: version
        uses: ./.github/actions/normalize-version
        with:
          version: ${{ steps.version_source.outputs.version }}

      - name: Stop existing production stack (safe)
        shell: pwsh
        run: |
          if (Test-Path ".\DOCKER.ps1") {
            .\DOCKER.ps1 -Stop
          }

      - name: Ensure Docker is running (runner health check)
        shell: pwsh
        run: |
          Write-Host "Ensuring Docker is running..." -ForegroundColor Cyan

          $dockerBinCandidates = @(
            "C:\Program Files\Docker\Docker\resources\bin",
            "C:\Program Files\Docker\Docker\resources"
          )

          foreach ($path in $dockerBinCandidates) {
            if ((Test-Path -LiteralPath $path) -and ($env:Path -notlike "*$path*")) {
              $env:Path = "$path;$env:Path"
              Add-Content -Path $env:GITHUB_PATH -Value $path
            }
          }

          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Error "Docker command not found in PATH after normalization"
            exit 1
          }

          try {
            Start-Service -Name "com.docker.service" -ErrorAction SilentlyContinue | Out-Null
          } catch {
            # Service may not exist in all environments
          }

          $desktopCandidates = @(
            "C:\Program Files\Docker\Docker\Docker Desktop.exe",
            "C:\Program Files\Docker\Docker\Docker.exe"
          )

          foreach ($candidate in $desktopCandidates) {
            if (Test-Path $candidate) {
              Start-Process -FilePath $candidate -ErrorAction SilentlyContinue | Out-Null
              break
            }
          }

          $maxAttempts = 12
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            docker ps > $null 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker is available and running (verified via docker ps)" -ForegroundColor Green
              exit 0
            }

            $dockerProcess = Get-Process docker, dockerd, "Docker Desktop" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dockerProcess) {
              Write-Host "Docker process detected ($($dockerProcess.ProcessName)) - proceeding with deployment" -ForegroundColor Green
              exit 0
            }

            Write-Host "  Waiting for Docker to start ($attempt/$maxAttempts)..." -ForegroundColor Gray
            Start-Sleep -Seconds 3
          }

          Write-Error "Docker failed to start after $maxAttempts attempts"
          exit 1

      - name: Docker status snapshot
        shell: pwsh
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Warning "Docker command not found; skipping status snapshot"
            exit 0
          }

          Write-Host "Docker version:" -ForegroundColor Cyan
          docker version

          Write-Host "Docker info:" -ForegroundColor Cyan
          docker info

          Write-Host "Docker containers:" -ForegroundColor Cyan
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Deploy to production server
        shell: pwsh
        run: |
          Write-Host "🚀 Deploying version ${{ steps.version.outputs.version }} to production..."
          if (-not (Test-Path ".\DOCKER.ps1")) {
            Write-Error "DOCKER.ps1 not found in repository root. Cannot deploy production."
            exit 1
          }

          .\DOCKER.ps1 -Update
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Production deployment failed (DOCKER.ps1 -Update)"
            exit $LASTEXITCODE
          }

          Write-Host "✅ Production deployment updated"

      - name: Run post-deployment validation
        shell: pwsh
        run: |
          Write-Host "🏥 Running production health checks..."
          $prodUrl = $env:PROD_URL
          $maxAttempts = 20
          $currentDelayMs = 1000
          $maxDelayMs = 20000

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Health check attempt $attempt/$maxAttempts at $(Get-Date -Format 'HH:mm:ss')..."
            try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri "$prodUrl/health" -TimeoutSec 10
              if ($response.StatusCode -eq 200 -and $response.Content -match '"status"') {
                Write-Host "✅ Production health check passed" -ForegroundColor Green
                $response.Content | Write-Host
                exit 0
              }
            } catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)" -ForegroundColor Yellow
            }

            # Exponential backoff with reduced window to maintain ~5 minute timeout
            # Pattern: 1s, 1.5s, 2.25s, 3.375s, 5s, 7.5s, 11s, 16s, 20s, 20s...
            $nextDelayMs = [Math]::Min([int]($currentDelayMs * 1.5), $maxDelayMs)
            $delaySec = [Math]::Round($nextDelayMs / 1000, 1)
            Write-Host "Waiting ${delaySec}s before next attempt..." -ForegroundColor Gray
            Start-Sleep -Milliseconds $nextDelayMs
            $currentDelayMs = $nextDelayMs
          }

          Write-Error "❌ Production health check failed after $maxAttempts attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Tag: ${{ github.ref }}"

  # ============================================================================
  # PHASE 9: RELEASE MANAGEMENT
  # ============================================================================
  # NOTE: Release creation is centralized in release-on-tag.yml to prevent
  # duplicate release owners. This job is removed to maintain single source of truth.
  # ============================================================================
  # PHASE 10: POST-DEPLOYMENT MONITORING
  # ============================================================================

  post-deployment-monitoring:
    name: 📊 Post-Deployment Monitoring
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [production-deploy-gate, deploy-production]
    # Monitoring reuses the normalized production URL from the gate job.
    if: startsWith(github.ref, 'refs/tags/v1.') && needs.deploy-production.result == 'success'
    env:
      PROD_URL: ${{ needs.production-deploy-gate.outputs.prod_url }}
    steps:
      - name: Monitor application health
        run: |
          echo "📊 Monitoring application health for 5 minutes..."
          HEALTH_CHECKS=0
          HEALTH_FAILURES=0

          check_health() {
            local url="$1"
            curl -f -s "${url}" | grep -q '"status"'
          }

          if [ -z "${PROD_URL}" ]; then
            echo "⚠️  PROD_URL not set. Skipping post-deployment monitoring."
            exit 0
          fi

          for i in {1..10}; do
            echo "Health check $i/10 at $(date)..."
            HEALTH_CHECKS=$((HEALTH_CHECKS + 1))

            if check_health "${PROD_URL}/health" || check_health "${PROD_URL}/api/v1/health"; then
              echo "✅ Health check passed"
            else
              echo "⚠️  Health check failed"
              HEALTH_FAILURES=$((HEALTH_FAILURES + 1))
            fi

            sleep 30
          done

          echo "📊 Health monitoring summary:"
          echo "Total checks: $HEALTH_CHECKS"
          echo "Failures: $HEALTH_FAILURES"
          echo "Success rate: $(( (HEALTH_CHECKS - HEALTH_FAILURES) * 100 / HEALTH_CHECKS ))%"

          if [ $HEALTH_FAILURES -gt 2 ]; then
            echo "❌ Too many health check failures"
            exit 1
          fi

      - name: Check application metrics
        run: |
          echo "📈 Checking application metrics..."
          if [ -z "${PROD_URL}" ]; then
            echo "⚠️  PROD_URL not set. Skipping metrics check."
            exit 0
          fi
          # Check metrics endpoint if available
          if curl -f -s "${PROD_URL}/metrics" > /dev/null 2>&1; then
            echo "✅ Metrics endpoint responsive"
            # Parse and validate key metrics
            echo "Metric checks completed"
          else
            echo "⚠️  Metrics endpoint not available (optional)"
          fi

      - name: Notify monitoring results
        if: always()
        run: |
          echo "✅ Post-deployment monitoring complete"

  # ============================================================================
  # NOTIFICATION JOB (Always runs)
  # ============================================================================

  notify-completion:
    name: 📣 Notify Pipeline Completion
    runs-on: ubuntu-latest
    needs:
      [
        determine-test-scope,
        version-verification,
        workflow-version-policy,
        lint-backend,
        lint-frontend,
        secret-scan,
        test-backend,
        test-frontend,
        smoke-tests,
        run-e2e-tests,
        run-load-tests,
        build-frontend,
        build-docker-images,
        security-scan-backend,
        security-scan-frontend,
        security-scan-docker,
        consolidate-sarif-reports,
        cleanup-and-docs,
        release-asset-lock,
        staging-deploy-gate,
        production-deploy-gate,
        deploy-staging,
        deploy-production,
        post-deployment-monitoring
      ]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          RESULTS="${{ needs.version-verification.result }} ${{ needs.workflow-version-policy.result }} ${{ needs.lint-backend.result }} ${{ needs.lint-frontend.result }} ${{ needs.secret-scan.result }} ${{ needs.test-backend.result }} ${{ needs.test-frontend.result }} ${{ needs.smoke-tests.result }} ${{ needs.build-frontend.result }} ${{ needs.build-docker-images.result }} ${{ needs.security-scan-backend.result }} ${{ needs.security-scan-frontend.result }} ${{ needs.security-scan-docker.result }} ${{ needs.cleanup-and-docs.result }} ${{ needs.release-asset-lock.result }} ${{ needs.staging-deploy-gate.result }} ${{ needs.production-deploy-gate.result }} ${{ needs.deploy-staging.result }} ${{ needs.deploy-production.result }} ${{ needs.post-deployment-monitoring.result }}"
          if echo "$RESULTS" | grep -Eq "failure|cancelled"; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=CI/CD pipeline reported one or more failed jobs" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=CI pipeline completed successfully (release/deploy gates may be intentionally skipped)" >> $GITHUB_OUTPUT
          fi

      - name: Check Slack webhook configuration
        if: ${{ env.SLACK_WEBHOOK_URL == '' }}
        run: |
          echo "⚠️  WARNING: SLACK_WEBHOOK_URL is not configured"
          echo "Pipeline status notifications will NOT be sent to Slack"
          echo "To enable: Set SLACK_WEBHOOK_URL secret in repository settings"
          echo "Reference: Settings → Secrets and variables → Actions → New repository secret"

      - name: Send notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "SMS CI/CD Pipeline: ${{ steps.status.outputs.status }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.event_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Pipeline Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK




