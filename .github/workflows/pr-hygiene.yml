name: PR Hygiene

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'scripts/**'
      - 'docs/**'
      - 'VERSION'
      - 'infra/scripts/ops/COMMIT_READY.ps1'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'src/frontend/package.json'
      - 'src/frontend/package-lock.json'
      - 'src/backend/requirements*.txt'
      - 'infra/docker/**'
      - 'infra/installer/**'
      - 'infra/scripts/**'
  workflow_dispatch:

concurrency:
  group: pr-hygiene-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  version-consistency:
    name: Version Consistency
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Verify version consistency
        shell: pwsh
        run: ./scripts/VERIFY_VERSION.ps1 -CheckOnly

  commit-ready:
    name: Commit Ready Quick
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run commit ready quick validation
        shell: pwsh
        run: ./infra/scripts/ops/COMMIT_READY.ps1 -Quick -NonInteractive

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: [version-consistency, commit-ready]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: GPL-3.0, AGPL-3.0

