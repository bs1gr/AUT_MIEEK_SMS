name: Native DeepClean Safety

on:
  pull_request:
    paths:
      - 'infra/scripts/dev/NATIVE.ps1'
      - '.github/workflows/**'

jobs:
  dry-run-check:
    name: Dry-run listing should succeed
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run DeepClean dry-run (WhatIf)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\infra\scripts\dev\NATIVE.ps1 -DeepClean -WhatIf

      - name: Run native safety script (CI helper)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Execute the CI helper script which runs a set of non-destructive checks
          .\scripts\ci\native-safety.ps1
