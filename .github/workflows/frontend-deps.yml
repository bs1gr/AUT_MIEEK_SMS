name: Frontend Dependency Audit

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  pull_request:
    paths:
      - 'src/frontend/package.json'
      - 'src/frontend/package-lock.json'
      - '.github/workflows/frontend-deps.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run npm audit
        working-directory: ./src/frontend
        run: npm audit --json > audit-report.json || true

      - name: Check for critical vulnerabilities
        shell: bash
        working-directory: ./src/frontend
        run: |
          set -euo pipefail

          jq empty audit-report.json

          CRITICAL_COUNT="$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)"
          echo "Detected $CRITICAL_COUNT critical vulnerabilities"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi

          echo "✅ No critical vulnerabilities"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-report
          path: src/frontend/audit-report.json
          retention-days: 30

  update-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check for outdated packages
        working-directory: ./src/frontend
        run: |
          echo "📦 Outdated packages:"
          npm outdated || true



