# Fix 2: E2E Tests Environment
# File: .github/workflows/e2e-tests.yml

name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'installer/**'
      - 'tools/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # E2E tests are expensive - only run on main branch or when explicitly requested
    # To request E2E on a PR, either:
    #   1. Add [full-test] to PR title, or
    #   2. Add 'requires:e2e' label to PR
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.title, '[full-test]') ||
      contains(github.event.pull_request.labels.*.name, 'requires:e2e')
    # E2E tests must pass - they verify end-to-end functionality
    # If tests fail, the issue must be fixed before merge
    continue-on-error: false
    env:
      DATABASE_URL: sqlite:///${{ github.workspace }}/data/student_management.db

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements*.txt

      # FIX 1: Add system dependencies check
      - name: Update system packages
        run: |
          sudo apt-get update || echo "Failed to update apt, continuing..."

      - name: Determine Playwright version
        id: pwver
        working-directory: ./src/frontend
        run: |
          VERSION=$(node -p "require('./package.json').devDependencies['@playwright/test'].replace(/^\^/, '')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          MINOR=$(node -p "require('./package.json').devDependencies['@playwright/test'].replace(/^\^/, '').split('.').slice(0,2).join('.')")
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "Playwright version: $VERSION"

      # NOTE: Disabling cache for now due to unreliable restoration in CI
      # The browser download (~150MB) is faster than debugging cache issues
      # - name: Cache Playwright browsers
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/ms-playwright
      #     key: playwright-${{ runner.os }}-${{ steps.pwver.outputs.version }}
      #     restore-keys: |
      #       playwright-${{ runner.os }}-${{ steps.pwver.outputs.minor }}
      #       playwright-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: ./src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./src/frontend
        run: |
          # Clear old Playwright cache to force fresh download with new version
          rm -rf ~/.cache/ms-playwright node_modules/.cache || true
          npm ci

      - name: Install system dependencies for Playwright
        run: |
          # Use Playwright's official system dependency installer
          cd src/frontend
          npx playwright install-deps chromium 2>/dev/null || true
          cd ..

      - name: Install Playwright browsers
        working-directory: ./src/frontend
        run: |
          echo "Installing Playwright chromium browser..."
          for i in {1..3}; do
            echo "Attempt $i/3 to install Playwright..."
            if npx playwright install chromium; then
              echo "✅ Playwright installed successfully"
              break
            fi
            if [ $i -lt 3 ]; then
              echo "⚠️  Attempt $i failed, retrying..."
              sleep 5
            else
              echo "❌ Failed to install Playwright after 3 attempts"
              exit 1
            fi
          done

          echo ""
          echo "Verifying installation..."
          npx playwright --version

          echo ""
          echo "Checking for chromium executable..."
          find ~/.cache/ms-playwright -name "chrome-headless-shell*" -o -name "chrome" 2>/dev/null | head -10 || echo "⚠️  Chrome not found, attempting to install dependencies..."

          # Install system dependencies as fallback
          echo "Installing system dependencies for Playwright..."
          npx playwright install-deps chromium || echo "⚠️  Some dependencies may be missing (non-critical)"

      - name: Build frontend
        working-directory: ./src/frontend
        run: npm run build

      # FIX 3: Add database initialization
      - name: Prepare data directory
        run: mkdir -p ./data

      # FIX 4: Initialize database with migrations before seeding
      - name: Initialize database
        run: |
          set -euo pipefail
          echo "Running Alembic migrations..."
          cd ${{ github.workspace }} && python -c "import sys; sys.path.insert(0, '.'); from backend.run_migrations import run_migrations; result = run_migrations(); exit(0 if result else 1)" || {
            echo "❌ Database migration failed. This is a critical error that must be fixed."
            exit 1
          }

      - name: Run E2E setup diagnostics
        run: |
          echo "Running E2E setup diagnostics..."
          python src/backend/diagnose_e2e_setup.py || {
            echo "❌ Diagnostics found issues, but continuing..."
          }

      - name: Seed test data
        run: |
          echo "Seeding E2E test data..."
          set -euo pipefail
          python src/backend/seed_e2e_data.py || {
            echo "❌ Initial seed failed, retrying with force..."
            python -c "import sys; sys.path.insert(0, '.'); from backend.seed_e2e_data import seed_e2e_data; seed_e2e_data(force=True)"
          }

      - name: Validate seed data
        run: |
          echo "Validating E2E test data..."
          set -euo pipefail
          python src/backend/validate_e2e_data.py || {
            echo "❌ Validation failed"
            echo "Attempting force reseed and retry..."
            python -c "import sys; sys.path.insert(0, '.'); from backend.seed_e2e_data import seed_e2e_data; seed_e2e_data(force=True)"
            python src/backend/validate_e2e_data.py
          }

      # FIX 5: Add health check before starting tests
      - name: Start backend in background
        env:
          CSRF_ENABLED: '0'
          AUTH_MODE: permissive
          AUTH_LOGIN_THROTTLE_ENABLED: '0'
          AUTH_USER_LOCKOUT_ENABLED: '0'
          SERVE_FRONTEND: '1'
        run: |
          echo "Starting backend server..."
          echo "Frontend build exists: $(test -f frontend/dist/index.html && echo 'YES' || echo 'NO')"
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          echo $! > backend.pid
          sleep 5

          # Wait for backend to be ready with better error handling
          echo "Waiting for backend health check..."
          MAX_ATTEMPTS=60
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."
            HEALTH_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health 2>&1)
            HEALTH=$(curl -s http://127.0.0.1:8000/health 2>&1 || echo "FAILED")
            if [ "$HEALTH_CODE" = "200" ] && echo "$HEALTH" | grep -q '"status"'; then
              echo "✅ Backend is ready (attempt $ATTEMPT/$MAX_ATTEMPTS, HTTP $HEALTH_CODE)"
              echo "Health response: $HEALTH" | head -1
              break
            fi
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Backend failed to start within $(($MAX_ATTEMPTS / 2)) seconds"
              echo "Last health check response:"
              curl -v http://127.0.0.1:8000/health 2>&1 || true
              echo "\nTrying root endpoint:"
              curl -v http://127.0.0.1:8000/ 2>&1 | head -20 || true
              if [ -f backend.pid ]; then
                echo "Backend process status:"
                ps aux | grep $(cat backend.pid) || echo "Process not found"
              fi
              exit 1
            fi
            echo "⏳ Waiting for backend... ($ATTEMPT/$MAX_ATTEMPTS)"
            sleep 1
          done

      # FIX: Validate login endpoint works before running E2E tests
      - name: Check login health
        run: |
          echo "=== Verifying Authentication Setup ==="
          echo ""
          echo "1. Checking if test user exists in database..."
          python -c "
          import sys
          sys.path.insert(0, '.')
          from sqlalchemy import create_engine
          from sqlalchemy.orm import sessionmaker
          from backend.models import User

          engine = create_engine('sqlite:///./data/student_management.db')
          Session = sessionmaker(bind=engine)
          db = Session()

          user = db.query(User).filter(User.email == 'test@example.com').first()
          if user:
              print(f'✅ Test user found: {user.email} (role: {user.role}, active: {user.is_active})')
              print(f'   Has password hash: {bool(user.hashed_password)}')
              db.close()
              sys.exit(0)
          else:
              print('❌ Test user NOT found in database!')
              db.close()
              sys.exit(1)
          "

          echo ""
          echo "2. Testing login endpoint with test credentials..."
          python src/backend/check_login_health.py

          echo ""
          echo "=== Authentication validation complete ==="

      - name: Run E2E tests
        working-directory: ./src/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
          DEBUG: 'pw:api'
          VITE_API_URL: http://127.0.0.1:8000/api/v1
        timeout-minutes: 40
        id: e2e
        run: |
          echo "=== Sanity check: Verify backend serving frontend ==="
          echo "Checking root endpoint /..."
          curl -s -I http://127.0.0.1:8000/ | head -5

          echo ""
          echo "=== Checking for login form in HTML response ==="
          curl -s http://127.0.0.1:8000/ | grep -o 'auth-login-email\|auth-login-password' || echo "⚠️  Login form IDs not found in HTML"

          echo ""
          echo "=== Checking /api response ==="
          curl -s http://127.0.0.1:8000/api | head -100

          echo ""
          echo "=== Allowing app to settle (5s) ==="
          sleep 5

          echo ""
          echo "=== Running Playwright E2E tests ==="
          set +e
          npm run e2e -- --reporter=list --workers=1 --timeout=120000 --max-failures=3
          STATUS=$?
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          exit $STATUS

      - name: Kill backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            echo "Stopping backend (PID: $(cat backend.pid))..."
            kill $(cat backend.pid) 2>/dev/null || echo "Backend already stopped"
            rm backend.pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Extract test results
        if: always()
        id: test-results
        run: |
          set -euo pipefail

          echo "Extracting test results..."
          if [ -f frontend/playwright-report/index.html ]; then
            # Extract test counts from JSON summary if available, fall back to HTML parsing
            if [ -f frontend/test-results/summary.json ]; then
              PASSED=$(jq -r '.stats.expected // 0' frontend/test-results/summary.json 2>/dev/null || echo "0")
              FAILED=$(jq -r '.stats.unexpected // 0' frontend/test-results/summary.json 2>/dev/null || echo "0")
              SKIPPED=$(jq -r '.stats.skipped // 0' frontend/test-results/summary.json 2>/dev/null || echo "0")
            else
              # Fallback to HTML parsing (fragile but better than silent failure)
              PASSED=$(grep -o 'passed">[0-9]*' frontend/playwright-report/index.html 2>/dev/null | grep -o '[0-9]*' | head -1 || echo "0")
              FAILED=$(grep -o 'failed">[0-9]*' frontend/playwright-report/index.html 2>/dev/null | grep -o '[0-9]*' | head -1 || echo "0")
              SKIPPED=$(grep -o 'skipped">[0-9]*' frontend/playwright-report/index.html 2>/dev/null | grep -o '[0-9]*' | head -1 || echo "0")
            fi

            TOTAL=$(( ${PASSED:-0} + ${FAILED:-0} + ${SKIPPED:-0} ))

            echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
            echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
            echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "Test Results: ${PASSED:-0} passed, ${FAILED:-0} failed, ${SKIPPED:-0} skipped (Total: $TOTAL)"
          else
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "⚠️  No test report found"
          fi

      - name: Comment E2E result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = core.getInput('status', { required: false }) || '${{ steps.e2e.outputs.status }}';
            const passed = '${{ steps.test-results.outputs.passed }}' || '0';
            const failed = '${{ steps.test-results.outputs.failed }}' || '0';
            const skipped = '${{ steps.test-results.outputs.skipped }}' || '0';
            const total = '${{ steps.test-results.outputs.total }}' || '0';

            const conclusion = status === '0' ? '✅ Passed' : '❌ Failed';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `### 🎭 E2E Test Results`,
              '',
              `**Status:** ${conclusion}`,
              '',
              `**Tests:**`,
              `- ✅ Passed: ${passed}`,
              `- ❌ Failed: ${failed}`,
              `- ⏭️ Skipped: ${skipped}`,
              `- 📊 Total: ${total}`,
              '',
              `**Resources:**`,
              `- [View full logs](${runUrl})`,
              `- Artifacts: \`e2e-test-results\` (screenshots, videos, reports)`,
              '',
              failed > 0 ? '⚠️  **Action required:** Please review failed tests and screenshots in artifacts.' : '🎉 All E2E tests passed!',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload backend logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-logs
          path: backend/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect E2E test metrics (NEW)
        if: always()
        id: metrics
        run: |
          echo "=== Collecting E2E Test Metrics ==="
          mkdir -p ci-artifacts

          python scripts/e2e_metrics_collector.py \
            --report frontend/test-results/report.json \
            --run-id "${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --output ci-artifacts/metrics.json \
            || echo "⚠️  Metrics collection encountered an issue (non-blocking)"

          if [ -f ci-artifacts/metrics.json ]; then
            echo "✅ Metrics collected successfully"
            cat ci-artifacts/metrics.json
          else
            echo "⚠️  No metrics file generated"
          fi

      - name: Detect E2E failure patterns (NEW)
        if: always()
        run: |
          echo "=== Analyzing Test Failure Patterns ==="
          mkdir -p ci-artifacts

          python scripts/e2e_failure_detector.py \
            --report frontend/test-results/report.json \
            --output ci-artifacts/failure-patterns.json \
            || echo "⚠️  Failure detection encountered an issue (non-blocking)"

          if [ -f ci-artifacts/failure-patterns.json ]; then
            echo "✅ Failure patterns analyzed"
            python -m json.tool ci-artifacts/failure-patterns.json || true
          fi

      - name: Archive metrics and patterns (NEW)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-metrics-and-patterns
          path: ci-artifacts/
          retention-days: 90
          if-no-files-found: ignore

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🎭 E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          STATUS="${{ steps.e2e.outputs.status }}"
          if [ "$STATUS" = "0" ]; then
            echo "✅ **Status:** All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Tests failed (exit code: $STATUS)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passed: ${{ steps.test-results.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: ${{ steps.test-results.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⏭️ Skipped: ${{ steps.test-results.outputs.skipped }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Total: ${{ steps.test-results.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Monitoring Data" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Metrics and failure patterns saved to \`e2e-metrics-and-patterns\` artifact (90-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test report, screenshots, and videos available in \`e2e-test-results\` artifact" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.test-results.outputs.failed }}" != "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️  **Failed tests detected** - check artifacts for screenshots and trace files" >> $GITHUB_STEP_SUMMARY
          fi


