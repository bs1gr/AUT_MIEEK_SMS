name: Windows Installer Build

# Manual-only validation workflow:
# - This workflow is retained for ad hoc installer verification builds.
# - Canonical release publication is handled by `release-on-tag.yml` plus
#   `release-installer-with-sha.yml`.
# - Keeping this workflow off tag triggers avoids duplicate release-time Windows
#   builds and reduces confusion about which workflow owns published assets.

on:
  workflow_dispatch:
    inputs:
      output_mode:
        description: 'Output mode: release (publish as GitHub release) or repo-commit (commit to branch)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - repo-commit
      target_branch:
        description: '[Only for repo-commit mode] Target branch to commit installer to'
        required: false
        default: 'dist/installer'
        type: string

jobs:
  build:
    name: Build Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache Inno Setup
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\chocolatey\lib\innosetup
          key: ${{ runner.os }}-innosetup-1

      - name: Install Inno. Setup
        run: choco install innosetup --no-progress

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build SMS Manager launcher
        shell: pwsh
        run: |
          dotnet restore .\installer\SMS_Manager\SMS_Manager.csproj
          dotnet publish .\installer\SMS_Manager\SMS_Manager.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeNativeLibrariesForSelfExtract=true

          $managerExe = '.\installer\dist\SMS_Manager.exe'
          if (-not (Test-Path $managerExe)) {
            Write-Error "SMS_Manager.exe was not produced at expected path: $managerExe"
            exit 1
          }

          Write-Host "SMS_Manager.exe ready: $managerExe" -ForegroundColor Green

      - name: Build Installer
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Write-Host "Cleaning dist before installer build..." -ForegroundColor Cyan
            Get-ChildItem dist -File -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          ./INSTALLER_BUILDER.ps1 -Action build -SkipCodeSign -Verbose -AutoFix
        env:
          CI: 'true'

      - name: Verify Installer Signature (Fail-Fast)
        shell: pwsh
        run: |
          Write-Host "Verifying installer signature..." -ForegroundColor Cyan
          $installer = Get-ChildItem -Path dist -Filter "SMS_Installer_*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No installer found in dist/"
            exit 1
          }

          $sig = Get-AuthenticodeSignature $installer.FullName
          Write-Host "Signature Status: $($sig.Status)" -ForegroundColor $(if ($sig.Status -eq 'Valid') { 'Green' } else { 'Red' })

          if ($sig.Status -ne 'Valid') {
            # Soft-fail for CI without cert; production builds should have cert
            if ($env:SMS_CODESIGN_REQUIRED -eq 'true') {
              Write-Error "Build blocked: Installer must be signed. Status: $($sig.Status)"
              exit 1
            } else {
              Write-Warning "Unsigned installer in CI (SMS_CODESIGN_REQUIRED not set to 'true')"
              Write-Host "Note: CI builds currently skip signing (-SkipCodeSign). For production releases, ensure certificate is available." -ForegroundColor Yellow
              Write-Host "✅ Soft-fail: Allowing unsigned installer for CI build" -ForegroundColor Green
            }
          }

          if ($sig.Status -eq 'Valid') {
            $subject = $sig.SignerCertificate.Subject
            Write-Host "Signer: $subject" -ForegroundColor Green
            if ($subject -notmatch 'L=Limassol' -or $subject -notmatch 'C=CY') {
              Write-Error "Signer does not match required certificate (Limassol/CY)"
              exit 1
            }
          }

      - name: Normalize version from VERSION file
        id: version
        uses: ./.github/actions/normalize-version

      - name: Resolve Installer Artifact Path
        id: resolve_installer
        shell: pwsh
        run: |
          $versionRaw = "${{ steps.version.outputs.version_tag }}"
          $versionCore = "${{ steps.version.outputs.version_core }}"
          $expectedCore = "dist\SMS_Installer_${versionCore}.exe"
          $legacyTagged = "dist\SMS_Installer_${versionRaw}.exe"

          if (-not (Test-Path $expectedCore) -and (Test-Path $legacyTagged)) {
            Write-Warning "Detected legacy installer naming with v-prefix; normalizing to core filename..."
            Rename-Item -Path $legacyTagged -NewName (Split-Path -Leaf $expectedCore) -Force
          }

          if (-not (Test-Path $expectedCore)) {
            Write-Error "Expected installer missing: $expectedCore"
            exit 1
          }

          "path=$expectedCore" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Installer Artifact (For Access by Downstream Jobs)
        uses: actions/upload-artifact@v4
        with:
          name: SMS_Installer
          path: ${{ steps.resolve_installer.outputs.path }}
          if-no-files-found: error

  # ============================================================================
  # OUTPUT JOBS (Consolidation 2: Dual-mode publication)
  # ============================================================================

  publish-release:
    name: 📦 Publish as GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.output_mode == 'release' || github.event.inputs.output_mode == '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: SMS_Installer

      - name: Create Release
        run: |
          VERSION=$(cat VERSION)
          INSTALLER=$(ls SMS_Installer_*.exe 2>/dev/null | head -1)

          if [ -z "$INSTALLER" ]; then
            echo "❌ No installer found"
            exit 1
          fi

          echo "📦 Publishing installer: $INSTALLER"
          gh release create "$VERSION" "$INSTALLER" --generate-notes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commit-to-repo:
    name: 💾 Commit Installer to Repository
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.output_mode == 'repo-commit' }}
    steps:
      - name: Checkout Target Branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.target_branch || 'dist/installer' }}
          fetch-depth: 0

      - name: Download Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: SMS_Installer

      - name: Commit and Push Installer
        run: |
          INSTALLER=$(ls SMS_Installer_*.exe 2>/dev/null | head -1)
          VERSION=$(cat VERSION)

          if [ -z "$INSTALLER" ]; then
            echo "❌ No installer found"
            exit 1
          fi

          echo "💾 Committing installer to ${{ github.event.inputs.target_branch || 'dist/installer' }}"
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          git add "$INSTALLER"
          git commit -m "chore: update installer $VERSION" || echo "No changes to commit"

          # Try direct push first (for non-protected branches)
          git push origin ${{ github.event.inputs.target_branch || 'dist/installer' }} || {
            echo "⚠️  Direct push failed (protected branch?), attempting PR fallback..."
            gh pr create --base ${{ github.event.inputs.target_branch || 'dist/installer' }} \
              --head "installer-update-$(date +%s)" \
              --title "chore: update installer $VERSION" \
              --body "Automated installer update" || true
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
