name: Orchestrated Maintenance & Cleanup

on:
  schedule:
    # Daily cleanup at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      cleanup_level:
        description: 'Cleanup level'
        required: true
        default: 'standard'
        type: choice
        options:
          - minimal
          - standard
          - aggressive

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ============================================================================
  # CLEANUP JOBS
  # ============================================================================

  cleanup-workflow-runs:
    name: 🧹 Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Delete workflow runs older than 30 days
        run: |
          echo "🧹 Cleaning up workflow runs older than 30 days..."

          if ! command -v jq >/dev/null 2>&1; then
            echo 'jq is not installed or not available on PATH. This workflow requires jq to parse GitHub CLI JSON output.'
            exit 1
          fi

          # Get current timestamp
          CUTOFF_DATE=$(date -u -d "30 days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff date: $CUTOFF_DATE"

          # List all workflow runs and delete old ones
          RUN_DATA=$(gh run list --repo ${{ github.repository }} --json databaseId,createdAt)
          if [ $? -ne 0 ]; then
            echo "Failed to fetch workflow runs"
            exit 1
          fi

          echo "$RUN_DATA" | jq -r --arg cutoff "$CUTOFF_DATE" '.[] | select(.createdAt < $cutoff) | .databaseId' > /tmp/old_runs.txt

          DELETED=0
          while IFS= read -r RUN_ID; do
            if [ -n "$RUN_ID" ]; then
              echo "Deleting run: $RUN_ID"
              gh run delete $RUN_ID --repo ${{ github.repository }} || true
              ((DELETED++))
            fi
          done < /tmp/old_runs.txt

          echo "✅ Deleted $DELETED old workflow runs"

  cleanup-artifacts:
    name: 📦 Cleanup Old Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Delete artifacts older than 14 days
        run: |
          echo "📦 Cleaning up artifacts older than 14 days..."

          if ! command -v jq >/dev/null 2>&1; then
            echo 'jq is not installed or not available on PATH. This workflow requires jq to parse GitHub CLI JSON output.'
            exit 1
          fi

          CUTOFF_DATE=$(date -u -d "14 days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff date: $CUTOFF_DATE"

          RUN_DATA=$(gh run list --repo ${{ github.repository }} --json databaseId,createdAt)
          if [ $? -ne 0 ]; then
            echo "Failed to fetch workflow runs"
            exit 1
          fi

          echo "$RUN_DATA" | jq -r --arg cutoff "$CUTOFF_DATE" '.[] | select(.createdAt < $cutoff) | .databaseId' > /tmp/artifact_runs.txt

          DELETED=0
          while IFS= read -r RUN_ID; do
            if [ -n "$RUN_ID" ]; then
              # Delete artifacts from this run
              for ARTIFACT_ID in $(gh run view $RUN_ID --repo ${{ github.repository }} --json artifacts | jq -r '.artifacts[].databaseId'); do
                echo "Deleting artifact: $ARTIFACT_ID"
                gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID -X DELETE || true
                ((DELETED++))
              done
            fi
          done < /tmp/artifact_runs.txt

          echo "✅ Deleted $DELETED old artifacts"

  # ============================================================================
  # MAINTENANCE JOBS
  # ============================================================================

  stale-cleanup:
    name: 👻 Close Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run stale workflow
        run: |
          echo "👻 Triggering stale issues/PRs workflow..."
          gh workflow run stale.yml --ref main 2>&1 || echo "Stale workflow triggered or already running"

  branch-protection:
    name: 🛡️ Apply Branch Protection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Apply branch protection rules
        run: |
          echo "🛡️ Ensuring branch protection rules are in place..."
          gh workflow run apply-branch-protection.yml --ref main 2>&1 || echo "Branch protection workflow triggered or already running"

  # ============================================================================
  # VERSION & DEPENDENCY CHECKS
  # ============================================================================

  check-outdated-deps:
    name: 📊 Check for Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check frontend dependencies
        run: |
          echo "📊 Checking frontend dependencies..."
          cd frontend
          npm outdated || echo "No outdated dependencies found"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check backend dependencies
        run: |
          echo "📊 Checking backend dependencies..."
          pip list --outdated || echo "No outdated dependencies found"

  # ============================================================================
  # DOCUMENTATION CHECKS
  # ============================================================================

  validate-docs:
    name: 📚 Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check documentation completeness
        run: |
          echo "📚 Validating documentation..."

          # Check for missing documentation files
          MISSING=0

          if [ ! -f "README.md" ]; then
            echo "⚠️  Missing: README.md"
            ((MISSING++))
          fi

          if [ ! -d "docs" ]; then
            echo "⚠️  Missing: docs directory"
            ((MISSING++))
          fi

          if [ ! -f "CONTRIBUTING.md" ]; then
            echo "⚠️  Missing: CONTRIBUTING.md"
            ((MISSING++))
          fi

          if [ $MISSING -gt 0 ]; then
            echo "⚠️  Found $MISSING missing documentation files"
          else
            echo "✅ All key documentation files present"
          fi

      - name: Validate markdown links
        continue-on-error: true
        run: |
          echo "🔗 Validating markdown links..."
          # This would require markdown-link-check tool
          echo "Skipping link validation (requires external tool)"

  # ============================================================================
  # SECURITY CHECKS
  # ============================================================================

  security-audit:
    name: 🔒 Run Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run CodeQL analysis
        run: |
          echo "🔒 Triggering CodeQL analysis..."
          gh workflow run codeql.yml --ref main 2>&1 || echo "CodeQL workflow triggered or already running"

      - name: Run Trivy scan
        run: |
          echo "🔒 Triggering Trivy vulnerability scan..."
          gh workflow run trivy-scan.yml --ref main 2>&1 || echo "Trivy workflow triggered or already running"

  # ============================================================================
  # REPORTING
  # ============================================================================

  generate-summary:
    name: 📋 Generate Maintenance Summary
    runs-on: ubuntu-latest
    needs:
      - cleanup-workflow-runs
      - cleanup-artifacts
      - stale-cleanup
      - branch-protection
      - check-outdated-deps
      - validate-docs
      - security-audit
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate summary report
        run: |
          echo "📋 **Orchestrated Maintenance Summary**" > /tmp/summary.md
          echo "" >> /tmp/summary.md
          echo "**Timestamp:** $(date -u)" >> /tmp/summary.md
          echo "**Repository:** ${{ github.repository }}" >> /tmp/summary.md
          echo "**Branch:** main" >> /tmp/summary.md
          echo "" >> /tmp/summary.md

          echo "## Cleanup Tasks" >> /tmp/summary.md
          echo "- ✅ Workflow runs cleanup" >> /tmp/summary.md
          echo "- ✅ Artifacts cleanup" >> /tmp/summary.md
          echo "- ✅ Stale issues/PRs processing" >> /tmp/summary.md
          echo "- ✅ Branch protection verification" >> /tmp/summary.md
          echo "" >> /tmp/summary.md

          echo "## Checks Completed" >> /tmp/summary.md
          echo "- ✅ Dependency audit" >> /tmp/summary.md
          echo "- ✅ Documentation validation" >> /tmp/summary.md
          echo "- ✅ Security scans (CodeQL & Trivy)" >> /tmp/summary.md
          echo "" >> /tmp/summary.md

          echo "## Status" >> /tmp/summary.md
          echo "All maintenance tasks completed successfully." >> /tmp/summary.md

          cat /tmp/summary.md

      - name: Create summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-summary
          path: /tmp/summary.md
          retention-days: 30

      - name: Comment on related issues
        run: |
          echo "📝 Maintenance tasks completed for $(date -u +%Y-%m-%d)"

      - name: Send notification
        if: always()
        run: |
          echo "✅ Orchestrated maintenance workflow completed"
          echo "Report available in workflow artifacts"
