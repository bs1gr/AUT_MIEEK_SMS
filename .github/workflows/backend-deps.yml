name: Backend Dependency Audit

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  pull_request:
    paths:
      - 'src/backend/requirements*.txt'
      - '.github/workflows/backend-deps.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -r src/backend/requirements.txt -r src/backend/requirements-dev.txt

      - name: Run pip-audit
        run: pip-audit --desc --format json --output backend-audit.json || true

      - name: Check for vulnerabilities
        shell: bash
        run: |
          set -euo pipefail

          jq empty backend-audit.json

          VULN_COUNT="$(jq '[.dependencies[]? | (.vulns // []) | length] | add // 0' backend-audit.json)"
          echo "Detected $VULN_COUNT vulnerability entries"

          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "❌ Vulnerabilities found!"
            jq -r '.dependencies[]? | select((.vulns // []) | length > 0) | "\(.name) \(.version): \((.vulns // []) | length) vulnerability(ies)"' backend-audit.json | sed -n '1,20p'
            exit 1
          fi

          echo "✅ No vulnerabilities found"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-audit-report
          path: backend-audit.json
          retention-days: 30

  update-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -r src/backend/requirements.txt -r src/backend/requirements-dev.txt

      - name: Check for outdated packages
        run: |
          echo "📦 Outdated packages:"
          pip list --outdated
