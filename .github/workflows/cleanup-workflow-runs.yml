name: Cleanup Workflow Runs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not delete)'
        required: false
        type: boolean
        default: false
      keep_count:
        description: 'Number of recent runs to keep'
        required: false
        type: number
        default: 5
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight UTC

jobs:
  cleanup:
    name: Delete Old Runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Check GitHub CLI availability
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo 'GitHub CLI (gh) is not installed or not available on PATH. This workflow requires gh for workflow run cleanup.'
            exit 1
          fi
          gh --version

      - name: Delete workflow runs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          KEEP_COUNT: ${{ inputs.keep_count }}
          GH_REPO: ${{ github.repository }}
        run: |
          CURRENT_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"

          while true; do
            echo "Fetching workflow runs..."
            # Fetch IDs (limit 1000) excluding current run, keeping top N
            RUN_IDS=$(gh run list --repo "$REPO" --limit 1000 --json databaseId --jq --arg current "$CURRENT_ID" --arg keep "$KEEP_COUNT" 'map(.databaseId) | map(select(. != ($current | tonumber))) | .[($keep | tonumber):] | .[]')

            if [ -z "$RUN_IDS" ]; then
              echo "No more runs found to delete (keeping last $KEEP_COUNT)."
              break
            fi

            COUNT=$(echo "$RUN_IDS" | wc -w)
            echo "Found $COUNT runs to delete in this batch."

            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run enabled. Would delete IDs:"
              echo "$RUN_IDS"
              break
            fi

            echo "Deleting runs in batches..."
            echo "$RUN_IDS" | xargs -n 1 -P 5 gh run delete --repo "$REPO"
          done

          echo "Cleanup complete."
