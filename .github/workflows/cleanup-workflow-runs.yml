name: Cleanup Workflow Runs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not delete)'
        required: false
        type: boolean
        default: false
      keep_count:
        description: 'Number of recent runs to keep'
        required: false
        type: number
        default: 50
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight UTC

jobs:
  cleanup:
    name: Delete Old Runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Check GitHub CLI availability
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo 'GitHub CLI (gh) is not installed or not available on PATH. This workflow requires gh for workflow run cleanup.'
            exit 1
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo 'jq is not installed or not available on PATH. This workflow requires jq to parse GitHub CLI JSON output.'
            exit 1
          fi
          gh --version
          jq --version

      - name: Delete workflow runs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          KEEP_COUNT: ${{ inputs.keep_count }}
          GH_REPO: ${{ github.repository }}
        run: |
          CURRENT_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          KEEP_COUNT="${{ inputs.keep_count }}"
          KEEP_COUNT="${KEEP_COUNT:-50}"  # fallback for scheduled runs (inputs.keep_count is empty)

          # Get all runs except current one
          echo "Fetching workflow runs..."
          ALL_RUNS=$(gh run list --repo "$REPO" --limit 1000 --json databaseId)

          # Parse and filter runs using jq
          RUN_IDS=$(echo "$ALL_RUNS" | jq -r --arg current "$CURRENT_ID" --arg keep "$KEEP_COUNT" '.[] | select(.databaseId != ($current | tonumber)) | .databaseId' | tail -n +$((KEEP_COUNT + 1)))

          if [ -z "$RUN_IDS" ]; then
            echo "No runs to delete (keeping last $KEEP_COUNT runs)."
          else
            COUNT=$(echo "$RUN_IDS" | wc -l)
            echo "Found $COUNT runs to delete."

            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run enabled. Would delete IDs:"
              echo "$RUN_IDS"
            else
              echo "Deleting runs in batches..."
              echo "$RUN_IDS" | xargs -n 1 -P 5 gh run delete --repo "$REPO"
            fi
          fi

          echo "Cleanup complete."
