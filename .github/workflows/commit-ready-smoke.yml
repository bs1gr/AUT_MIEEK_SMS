# Fix 1: COMMIT_READY Smoke Test
# File: .github/workflows/commit-ready-smoke.yml

name: COMMIT_READY Smoke (quick)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      include_cleanup:
        description: 'Include extended cleanup verification tests (slow)'
        required: false
        type: boolean

concurrency:
  group: commit-ready-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '24'

jobs:
  # Separate Ubuntu and Windows jobs for better isolation
  commit-ready-ubuntu:
    name: Run COMMIT_READY quick (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Reduced from 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            src/backend/requirements.txt
            src/backend/requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install backend dependencies (fast)
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          pip install ruff pytest mypy
          # Install full backend requirements to avoid missing optional deps
          pip install -r src/backend/requirements.txt

      - name: Install backend dev dependencies
        if: hashFiles('src/backend/requirements-dev.txt') != ''
        run: |
          set -euo pipefail

          pip install -r src/backend/requirements-dev.txt

      - name: Install frontend deps
        run: |
          set -euo pipefail

          cd src/frontend
          npm ci --prefer-offline --no-audit

      - name: Run backend fast tests (pytest) and produce JUnit
        env:
          AUTH_MODE: strict
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          set -euo pipefail

          echo "Running backend fast tests..."
          cd src/backend
          python -m pytest tests/ -m "not slow" -q --tb=short --junitxml=pytest-results.xml

      - name: Run frontend fast tests (vitest) and produce JUnit
        run: |
          set -euo pipefail

          echo "Running frontend fast tests..."
          cd src/frontend
          npx vitest run --reporter=junit --outputFile.junit=vitest-results.xml

      - name: Run COMMIT_READY quick smoke (skip tests for speed)
        env:
          DEV_EASE: '1'
        shell: bash  # Use bash for cross-platform compatibility
        run: |
          set -o pipefail
          echo "Running COMMIT_READY quick smoke..."
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./infra/scripts/ops/COMMIT_READY.ps1 -Mode quick -SkipTests -SkipCleanup -SkipPreCommitHooks -Verbose 2>&1 | tee commit_ready_output_ubuntu.txt
          echo "COMMIT_READY completed"

      - name: Upload smoke logs + JUnit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: commit-ready-smoke-logs-ubuntu
          path: |
            commit_ready_output_ubuntu.txt
            src/backend/pytest-results.xml
            src/frontend/vitest-results.xml
          retention-days: 7

  commit-ready-windows:
    name: Run COMMIT_READY quick (Windows)
    runs-on: windows-latest
    timeout-minutes: 30  # Windows takes longer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest mypy
          pip install -r src/backend/requirements.txt
          if (Test-Path "src/backend/requirements-dev.txt") {
            pip install -r src/backend/requirements-dev.txt
          }

      - name: Install frontend deps
        shell: pwsh
        run: |
          cd src/frontend
          npm ci --prefer-offline --no-audit --legacy-peer-deps

      - name: Run backend fast tests (pytest)
        shell: pwsh
        env:
          AUTH_MODE: strict
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          Write-Host "Running backend fast tests..."
          Push-Location src/backend
          python -m pytest tests/ -m "not slow" -q --tb=short --junitxml=pytest-results.xml
          Pop-Location

      - name: Run frontend fast tests (vitest)
        shell: pwsh
        run: |
          Write-Host "Running frontend fast tests..."
          Push-Location src/frontend
          npx vitest run --reporter=junit --outputFile.junit=vitest-results.xml
          Pop-Location

      - name: Prepare installer Greek text assets
        shell: pwsh
        run: |
          Write-Host "Ensuring installer Greek text assets are regenerated"
          if (Test-Path "fix_greek_encoding_permanent.py") {
            python "fix_greek_encoding_permanent.py"
          } else {
            Write-Host "Skipping fix_greek_encoding_permanent.py (file not found)"
          }

      - name: Run COMMIT_READY quick smoke
        shell: pwsh
        env:
          DEV_EASE: '1'
        run: |
          Write-Host "Running COMMIT_READY quick smoke..."
          $outFile = "commit_ready_output_windows.txt"
          & ./infra/scripts/ops/COMMIT_READY.ps1 -Quick -SkipTests -SkipCleanup -SkipPreCommitHooks *>&1 | Tee-Object -FilePath $outFile
          if ($LASTEXITCODE -ne 0) { Write-Error "COMMIT_READY failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }
          Write-Host "Wrote $outFile"

      - name: Upload smoke logs + JUnit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: commit-ready-smoke-logs-windows
          path: |
            commit_ready_output_windows.txt
            src/backend/pytest-results.xml
            src/frontend/vitest-results.xml
          retention-days: 7

  # ============================================================================
  # OPTIONAL CLEANUP VERIFICATION (Consolidation 3: Extended cleanup tests)
  # ============================================================================

  cleanup-smoke-test:
    name: Extended Cleanup Verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_cleanup == 'true' }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          [ -f "src/backend/requirements-dev.txt" ] && pip install -r src/backend/requirements-dev.txt || true
          cd src/frontend && npm ci --prefer-offline --no-audit || true

      - name: Create cleanup test fixtures
        shell: bash
        run: |
          echo "📋 Creating cleanup test fixtures..."
          mkdir -p /tmp/cleanup-test-fixtures
          # Create test artifacts to verify cleanup
          touch /tmp/cleanup-test-fixtures/test-artifact-$(date +%s).txt
          echo "Test fixture created at $(date)" > /tmp/cleanup-test-fixtures/marker.txt

      - name: Run extended cleanup verification
        shell: bash
        env:
          AUTH_MODE: strict
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          echo "🧹 Running extended cleanup verification on ${{ matrix.os }}..."
          cd src/backend
          python -m pytest tests/ -m "not slow" -q --tb=short || true
          cd ../../src/frontend
          npx vitest run || true

      - name: Verify cleanup fixtures were created
        shell: bash
        run: |
          echo "✅ Verifying cleanup test fixtures..."
          if [ -d "/tmp/cleanup-test-fixtures" ]; then
            echo "✅ Cleanup fixtures directory exists"
            ls -la /tmp/cleanup-test-fixtures
          else
            echo "⚠️  Cleanup fixtures directory missing"
          fi

      - name: Upload cleanup verification results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cleanup-verification-${{ matrix.os }}
          path: |
            src/backend/pytest-results.xml
            src/frontend/vitest-results.xml
          retention-days: 7
          if-no-files-found: warn


