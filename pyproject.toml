    "detect-secrets>=1.5.0",
    "ruff>=0.8.0",
    "pytest-asyncio==0.23.5",
    "mypy>=1.0.0",
    "aiosqlite==0.20.0",
    "httpx>=0.27.0",
    "python-multipart==0.0.32",  # Dependabot #185-197 fixed in >=0.0.31
    "types-requests>=2.32.0.20241016",
