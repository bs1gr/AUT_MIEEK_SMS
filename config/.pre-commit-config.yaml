# Pre-commit hooks for Student Management System
# Install: pip install pre-commit
# Setup: pre-commit install
# Run: pre-commit run --all-files

repos:
  # Security scanning
  - repo: local
    hooks:
      - id: pip-audit
        name: "🔒 Check backend dependencies (pip-audit)"
        entry: bash -c "pip-audit --skip-editable"
        language: system
        files: "requirements\.txt$"
        pass_filenames: false
        stages: [commit]

      - id: npm-audit
        name: "🔒 Check frontend dependencies (npm audit)"
        entry: bash -c "cd frontend && npm audit --omit=dev --audit-level=moderate"
        language: system
        files: "package-lock\.json$"
        pass_filenames: false
        stages: [commit]

      - id: no-hardcoded-secrets
        name: "🔐 No hardcoded secrets"
        entry: bash -c "if grep -r --include='*.py' --include='*.js' \"password.*=\" . --exclude-dir=.venv --exclude-dir=node_modules 2>/dev/null | grep -v \"hashed\|environ\|os.environ\" | head -5; then echo 'ERROR: Found potential hardcoded credentials'; exit 1; fi || true"
        language: system
        pass_filenames: false
        stages: [commit]
