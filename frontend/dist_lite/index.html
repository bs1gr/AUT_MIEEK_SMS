    <script>
      // Apply theme early to avoid flash and ensure light/dark consistency
      // Enhanced for Edge browser compatibility
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = false;

          // Enhanced media query check for Edge compatibility
          if (window.matchMedia) {
            var mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            prefersDark = mediaQuery.matches;

            // Force update for Edge browser (Chromium-based)
            if (typeof mediaQuery.addEventListener === 'function') {
              // Modern syntax - works in all browsers including Edge
              mediaQuery.addEventListener('change', function(e) {
                var currentTheme = localStorage.getItem('theme');
                // Only react to system changes if user selected 'system' theme
                if (currentTheme === 'system') {
                  var root = document.documentElement;
                  root.classList.remove('dark', 'relaxing');
                  var applyBody = function() {
                    if (document.body) {
                      document.body.classList.remove('dark', 'relaxing');
                      if (e.matches) document.body.classList.add('dark');
                    }
                  };
                  applyBody();
                  if (!document.body) {
                    document.addEventListener('DOMContentLoaded', applyBody, { once: true });
                  }
                  if (e.matches) {
                    root.classList.add('dark');
                  }
                }
              });
            }
          }

          var theme = stored || 'light';  // Default to 'light' to match React ThemeProvider
          var isDark = (theme === 'dark') || (theme === 'system' && prefersDark);
          var isRelaxing = (theme === 'relaxing');
          var root = document.documentElement;


          // Remove all theme classes first on <html>
          root.classList.remove('dark', 'relaxing');

          // Apply classes to body when it's available; avoid touching null body early
          var applyBodyClasses = function() {
            try {
              if (!document.body) return;
              document.body.classList.remove('dark', 'relaxing');
              if (isDark) document.body.classList.add('dark');
              else if (isRelaxing) document.body.classList.add('relaxing');
            } catch (err) {
              console.error('Failed to apply body classes:', err);
            }
          };

          // Apply classes to root immediately
          if (isDark) {
            root.classList.add('dark');
          } else if (isRelaxing) {
            root.classList.add('relaxing');
          }

          // Apply body classes now or on DOMContentLoaded
          applyBodyClasses();
          if (!document.body) {
            document.addEventListener('DOMContentLoaded', function() {
              applyBodyClasses();
            }, { once: true });
          } else {
          }

          // Force style recalculation for Edge
          if (typeof root.offsetHeight !== 'undefined') {
            void root.offsetHeight;
          }
        } catch (e) {
          // Fallback to light mode on error
          console.error('Theme initialization error:', e);
        }
      })();
    </script>

  <body>
    <div id="root"></div>
    <script>
      window._appLoadedAt = Date.now();
      window._appDebugLogs = [];

      function addLog(msg) {
        window._appDebugLogs.push(msg);
        console.log('[SMS-Debug]', msg);
      }

      // Show loading indicator while React loads
      const root = document.getElementById('root');
      root.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui; color: #666; flex-direction: column;"><div style="text-align: center;"><p style="margin: 0 0 20px 0; font-size: 18px; font-weight: 500;">Loading Student Management System</p><div style="width: 200px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden;"><div style="width: 30%; height: 100%; background: #4F46E5; border-radius: 2px; animation: slide 1.5s ease-in-out infinite;"></div></div></div></div><style>@keyframes slide { 0% { width: 30%; } 50% { width: 70%; } 100% { width: 30%; } }</style>';
      addLog('Loading indicator rendered at ' + new Date().toISOString());

      // Listen for errors
      window.addEventListener('error', (e) => {
        addLog('Error: ' + (e.error?.message || e.message || 'Unknown error'));
      });
      window.addEventListener('unhandledrejection', (e) => {
        addLog('Promise rejection: ' + (e.reason?.message || e.reason || 'Unknown'));
      });

      // Timeout safety: if React hasn't rendered in 15 seconds, show error
      const timeoutId = setTimeout(() => {
        if (!root.querySelector('[data-reactroot]') && !root.querySelector('[data-react-root]')) {
          const elapsed = ((Date.now() - window._appLoadedAt) / 1000).toFixed(1);
          const logs = window._appDebugLogs.slice(-5).join('\n');
          root.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui; color: #d32f2f; flex-direction: column; padding: 20px;"><div style="text-align: center;"><p style="margin: 0 0 20px 0; font-size: 18px; font-weight: 500;">⚠️ Application failed to load</p><p style="margin: 0 0 10px 0; font-size: 14px; color: #999;">Elapsed: ' + elapsed + 's</p><pre style="text-align: left; font-size: 12px; color: #666; background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto;">' + logs + '</pre></div></div>';
        }
      }, 15000);

      // Clear timeout once React renders
      const observer = new MutationObserver(() => {
        if (root.querySelector('[data-reactroot]') || root.querySelector('[data-react-root]')) {
          addLog('React app rendered successfully');
          clearTimeout(timeoutId);
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true, subtree: true });
    </script>
